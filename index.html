<!-- Firebase Realtime Database SDK -->
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, set, onValue } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

// ============================================================
// CREDENCIAIS DO FIREBASE — gbrsistema
// ============================================================
const firebaseConfig = {
  apiKey:            "AIzaSyCUc8zBg-ci8BwAUJB5pbqnRhzqhQIH26E",
  authDomain:        "gbrsistema.firebaseapp.com",
  projectId:         "gbrsistema",
  storageBucket:     "gbrsistema.appspot.com",
  messagingSenderId: "1045038353569",
  appId:             "1:1045038353569:web:bfee704688da2a20c2f4e0",
  databaseURL:       "https://gbrsistema-default-rtdb.firebaseio.com"
};
// ============================================================

let app, db, dbRef;
let saveTimeout = null;
let primeiroCarregamento = true;

function initFirebase() {
  try {
    app = initializeApp(firebaseConfig);
    db  = getDatabase(app);
    dbRef = ref(db, 'gbr/dados');
    setSyncStatus('loading', '🔄 Conectando ao Realtime Database...');
    startRealtimeSync();
  } catch(e) {
    setSyncStatus('err', '❌ Erro ao iniciar Firebase: ' + e.message);
    console.error('Firebase init error:', e);
  }
}

function startRealtimeSync() {
  // onValue dispara imediatamente com valor atual e depois a cada mudança
  onValue(dbRef, (snapshot) => {
    if (snapshot.exists()) {
      const data = snapshot.val();
      // Só aplica dados externos se NÃO somos nós que acabamos de salvar
      if (!window._saving) {
        mergeData(data);
        render();
      }
      if (primeiroCarregamento) {
        primeiroCarregamento = false;
        setSyncStatus('ok', '🟢 Conectado — dados carregados do Firebase');
      } else if (!window._saving) {
        setSyncStatus('ok', '🟢 Atualizado em tempo real — ' + new Date().toLocaleTimeString('pt-BR'));
      }
    } else {
      // Banco vazio: primeiro acesso, sobe os dados iniciais
      primeiroCarregamento = false;
      setSyncStatus('loading', '🔄 Primeiro acesso — enviando dados iniciais...');
      window.saveToFirebase();
    }
  }, (err) => {
    console.error('Realtime DB error:', err);
    if (err.code === 'PERMISSION_DENIED') {
      setSyncStatus('err', '🔒 Permissão negada — verifique as Regras do Realtime Database');
    } else {
      setSyncStatus('err', '❌ Erro de conexão: ' + err.message);
    }
    // Fallback: mantém localStorage
    setSyncStatus('warn', '⚠️ Usando dados locais — Firebase indisponível');
  });
}

function mergeData(data) {
  if (data.services)   S.services   = data.services;
  if (data.orc)        S.orc        = data.orc;
  if (data.clientes)   S.clientes   = data.clientes;
  if (data.estoque)    S.estoque    = data.estoque;
  if (data.movEstoque) S.movEstoque = data.movEstoque;
  if (data.agenda)     S.agenda     = data.agenda;
  if (data.gastos)     S.gastos     = data.gastos;
  if (data.cfg)        Object.assign(S.cfg, data.cfg);
  if (data.nextOrc)    S.nextOrc    = data.nextOrc;
  if (data.nextEst)    S.nextEst    = data.nextEst;
  if (data.nextCli)    S.nextCli    = data.nextCli;
  if (data.nextAg)     S.nextAg     = data.nextAg;
}

window.saveToFirebase = async function() {
  window._saving = true;
  setSyncStatus('loading', '💾 Salvando no Firebase...');
  const payload = {
    services:   S.services,
    orc:        S.orc,
    clientes:   S.clientes,
    estoque:    S.estoque,
    movEstoque: S.movEstoque,
    agenda:     S.agenda,
    gastos:     S.gastos,
    cfg:        S.cfg,
    nextOrc:    S.nextOrc,
    nextEst:    S.nextEst,
    nextCli:    S.nextCli,
    nextAg:     S.nextAg,
    updatedAt:  new Date().toISOString()
  };
  try {
    await set(dbRef, payload);
    saveToLocal(); // backup local paralelo
    setSyncStatus('ok', '🟢 Salvo no Firebase — ' + new Date().toLocaleTimeString('pt-BR'));
  } catch(e) {
    console.error('Save error:', e);
    saveToLocal();
    if (e.code === 'PERMISSION_DENIED') {
      setSyncStatus('err', '🔒 Permissão negada — verifique as Regras do Realtime Database');
    } else {
      setSyncStatus('err', '❌ Erro ao salvar: ' + e.message + ' (backup local feito)');
    }
  }
  setTimeout(() => { window._saving = false; }, 800);
};

// Debounce — salva 1,5s após última alteração
window.scheduleSave = function() {
  clearTimeout(saveTimeout);
  saveTimeout = setTimeout(() => window.saveToFirebase(), 1500);
};

initFirebase();
</script>

<body>

<!-- LOGIN -->
<div class="login-wrap" id="login-screen">
  <div class="login-box">
    <div class="login-logo">GBR</div>
    <div class="login-sub">Sistema de Gestão · Acesso restrito</div>
    <input class="login-input" type="password" id="login-pass" placeholder="••••••••" onkeydown="if(event.key==='Enter')checkLogin()">
    <button class="login-btn" onclick="checkLogin()">Entrar</button>
    <div class="login-err" id="login-err"></div>
  </div>
</div>

<!-- APP -->
<div class="app" id="app-root" style="display:none">
<div class="topbar">
  <div class="logo" id="top-logo">GBR SOLUÇÕES <span class="logo-sub" id="top-sub">· Sistema de Gestão</span></div>
  <nav class="nav">
    <button class="nb active" onclick="pg('dash')">📊 Dashboard</button>
    <button class="nb" onclick="pg('servicos')">🔧 Serviços</button>
    <button class="nb" onclick="pg('calc')">🧮 Calculadora</button>
    <button class="nb" onclick="pg('orc')">📋 Orçamentos</button>

    <button class="nb" onclick="pg('config')">⚙️ Config</button>

</div>
<div class="content" id="root"></div>
<div class="sync-bar">
  <div class="sync-dot loading" id="sync-dot"></div>
  <span id="sync-msg">Iniciando Firebase...</span>
  <div style="margin-left:auto;display:flex;gap:6px">
    <button class="btn ghost" style="padding:3px 10px;font-size:10px" onclick="exportJSON()">📥 Exportar JSON</button>
    <button class="btn" style="padding:3px 10px;font-size:10px" onclick="saveToFirebase()">☁️ Salvar agora</button>
  </div>
</div>
</div>
<div id="mroot"></div>

<script>
// ============================================================
// SENHA DE ACESSO — altere aqui
// ============================================================
const SENHA_ACESSO = "gbr2025";
// ============================================================

function checkLogin() {
  const v = document.getElementById('login-pass').value;
  if (v === SENHA_ACESSO) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app-root').style.display = 'flex';
    render();
  } else {
    document.getElementById('login-err').textContent = 'Senha incorreta. Tente novamente.';
    document.getElementById('login-pass').value = '';
    setTimeout(() => document.getElementById('login-err').textContent = '', 3000);
  }
}

function setSyncStatus(state, msg) {
  const d = document.getElementById('sync-dot');
  const m = document.getElementById('sync-msg');
  if (!d || !m) return;
  d.className = 'sync-dot ' + state;
  m.textContent = msg;
}

// localStorage fallback
function saveToLocal() {
  try {
    const payload = {
      services:S.services, orc:S.orc, clientes:S.clientes,
      estoque:S.estoque, movEstoque:S.movEstoque, agenda:S.agenda,
      gastos:S.gastos, cfg:S.cfg,
      nextOrc:S.nextOrc, nextEst:S.nextEst, nextCli:S.nextCli, nextAg:S.nextAg
    };
    localStorage.setItem('gbr_data', JSON.stringify(payload));
  } catch(e) {}
}
function loadFromLocal() {
  try {
    const raw = localStorage.getItem('gbr_data');
    if (raw) {
      const data = JSON.parse(raw);
      if (data.services)   S.services   = data.services;
      if (data.orc)        S.orc        = data.orc;
      if (data.clientes)   S.clientes   = data.clientes;
      if (data.estoque)    S.estoque    = data.estoque;
      if (data.movEstoque) S.movEstoque = data.movEstoque;
      if (data.agenda)     S.agenda     = data.agenda;
      if (data.gastos)     S.gastos     = data.gastos;
      if (data.cfg)        Object.assign(S.cfg, data.cfg);
      if (data.nextOrc)    S.nextOrc    = data.nextOrc;
      if (data.nextEst)    S.nextEst    = data.nextEst;
      if (data.nextCli)    S.nextCli    = data.nextCli;
      if (data.nextAg)     S.nextAg     = data.nextAg;
      return true;
    }
  } catch(e) {}
  return false;
}

// Se Firebase não configurado, usa localStorage automaticamente
if (!window.saveToFirebase) {
  window.saveToFirebase = saveToLocal;
  window.scheduleSave = function() { saveToLocal(); setSyncStatus('ok','💾 Salvo localmente em '+new Date().toLocaleTimeString('pt-BR')); };
}

function exportJSON() {
  const payload = {
    services:S.services, orc:S.orc, clientes:S.clientes,
    estoque:S.estoque, movEstoque:S.movEstoque, agenda:S.agenda,
    gastos:S.gastos, cfg:S.cfg,
    nextOrc:S.nextOrc, nextEst:S.nextEst, nextCli:S.nextCli, nextAg:S.nextAg
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'gbr-backup-' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
}

function pg(p) {

function rAgenda() {
  const dias=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
  const hoje=11,total=31,primeiro=4;
  let cells=Array(primeiro).fill(null);
  for(let d=1;d<=total;d++)cells.push(d);
  while(cells.length%7!==0)cells.push(null);
  const tc={Serviço:'',Instalação:'',Orçamento:'am',Comercial:'gr',Pessoal:''};
  return `<div class="sh"><div class="sh-title">📅 Agenda — Maio 2025</div><button class="btn" onclick="mNovoAg()">+ Compromisso</button></div>
  <div class="cal-hdr">${dias.map(d=>`<span>${d}</span>`).join('')}</div>
  <div class="cal-grid">${cells.map(d=>{if(!d)return`<div style="min-height:52px"></div>`;const evs=S.agenda.filter(a=>a.dia===d);return`<div class="cal-day ${evs.length?'has-ev':''} ${d===hoje?'today':''}"><div class="dn">${d}</div>${evs.map(e=>`<div class="cal-ev ${tc[e.tipo]||''}">${e.hora} ${e.titulo.split('-')[0].trim().slice(0,7)}</div>`).join('')}</div>`;}).join('')}</div>
  <div style="margin-top:14px"><div class="sh-title" style="margin-bottom:10px;font-size:13px">Todos os compromissos</div>
  <div class="tw"><table><thead><tr><th style="width:7%">Dia</th><th style="width:8%">Hora</th><th style="width:28%">Título</th><th style="width:11%">Tipo</th><th style="width:11%">Status</th><th style="width:22%">Obs</th><th style="width:13%">Ações</th></tr></thead>
  <tbody>${[...S.agenda].sort((a,b)=>a.dia-b.dia).map(a=>`<tr><td style="font-weight:700;color:var(--blue3)">${a.dia}</td><td style="color:var(--text2)">${a.hora}</td><td style="font-weight:600">${a.titulo}</td><td><span class="badge bl">${a.tipo}</span></td><td><span class="badge ${a.status==='Confirmado'?'gr':'am'}">${a.status}</span></td><td style="font-size:11px;color:var(--text2)">${a.obs}</td><td><div style="display:flex;gap:3px"><button class="btn ghost sm" onclick="toggleAgStatus(${a.id})">${a.status==='Confirmado'?'⏸':'✅'}</button><button class="btn danger sm" onclick="delAg(${a.id})">🗑</button></div></td></tr>`).join('')}</tbody></table></div></div>`;
}

function rFin() {
  const aprov=S.orc.filter(o=>o.status==='Aprovado');
  const fat=aprov.reduce((a,o)=>a+o.valor,0);
  const lucro=aprov.reduce((a,o)=>a+o.lucro,0);
  const gasto=S.gastos.reduce((a,g)=>a+g.valor,0);
  const saldo=lucro-gasto;
  return `<div class="sh"><div class="sh-title">💰 Financeiro</div><button class="btn" onclick="mNovoGasto()">+ Gasto</button></div>
  <div class="kpi-grid"><div class="kpi bl"><div class="kpi-lbl">Faturamento</div><div class="kpi-val">${fmtR(fat)}</div></div><div class="kpi gr"><div class="kpi-lbl">Lucro bruto</div><div class="kpi-val">${fmtR(lucro)}</div></div><div class="kpi re"><div class="kpi-lbl">Gastos</div><div class="kpi-val">${fmtR(gasto)}</div></div><div class="kpi ${saldo>0?'gr':'re'}"><div class="kpi-lbl">Saldo</div><div class="kpi-val">${fmtR(saldo)}</div></div></div>
  <div class="row2">
    <div class="card"><div class="card-title">🎯 Metas</div>${[['Meta mensal',fat,S.cfg.metaMensal],['Meta semanal',fat/4,S.cfg.metaSemanal],['Meta anual',fat,S.cfg.metaAnual]].map(([lbl,val,meta])=>{const p=Math.min(100,Math.round(val/meta*100));return`<div style="margin-bottom:12px"><div style="display:flex;justify-content:space-between;margin-bottom:3px;font-size:12px"><span style="color:var(--text2)">${lbl}</span><span style="font-weight:700;color:${p>=100?'var(--green)':p>=60?'var(--amber)':'var(--red)'}">${p}%</span></div><div style="font-size:10px;color:var(--text3);margin-bottom:3px">${fmtR(val)} / ${fmtR(meta)}</div><div class="prog"><div class="prog-f ${p>=100?'gr':p>=60?'am':'re'}" style="width:${p}%"></div></div></div>`;}).join('')}</div>
    <div class="card"><div class="card-title">📊 Gastos</div><div class="bar-chart">${S.gastos.map(g=>`<div class="bar-row"><div class="bar-lbl">${g.desc}</div><div class="bar-track"><div class="bar-f" style="width:${gasto?Math.round(g.valor/gasto*100):0}%;background:var(--red)"></div></div><div class="bar-val" style="color:var(--red)">R$${g.valor}</div></div>`).join('')}</div></div>
  </div>
  <div class="card"><div class="card-title">🧾 Lançamentos</div><div class="tw" style="border:none;margin-bottom:0"><table><thead><tr><th>Descrição</th><th>Data</th><th>Valor</th></tr></thead><tbody>${S.gastos.map(g=>`<tr><td>${g.desc}</td><td style="color:var(--text2)">${g.data}</td><td style="color:var(--red);font-weight:700">R$${g.valor.toFixed(2)}</td></tr>`).join('')}</tbody></table></div></div>`;
}

  <div class="orc-detail-row"><div class="orc-detail-lbl">Cliente</div><div class="orc-detail-val" style="font-weight:600">${o.cliente}</div></div>
  <div class="orc-detail-row"><div class="orc-detail-lbl">Telefone</div><div class="orc-detail-val">${o.tel}</div></div>
  <div class="orc-detail-row"><div class="orc-detail-lbl">Endereço</div><div class="orc-detail-val">${o.end}</div></div>

function salvarNovoServ(){S.services.push({id:Math.max(...S.services.map(s=>s.id),0)+1,nome:document.getElementById('sn').value||'Serviço',cat:document.getElementById('scat').value,sub:document.getElementById('ssub').value,tipo:document.getElementById('stipo').value,minVal:+document.getElementById('smin').value||0,medVal:+document.getElementById('smed').value||0,maxVal:+document.getElementById('smax').value||0,tempo:document.getElementById('stmp').value,dific:document.getElementById('sdif').value,material:+document.getElementById('smat').value||0,mdo:+document.getElementById('smdo').value||0,margem:+document.getElementById('smarg').value||30,garantia:document.getElementById('sgar').value,inclMat:false});closeM();render();auto();}
function mEditServ(id){const s=S.services.find(x=>x.id===id);if(!s)return;openM(`<div class="modal-title">Editar: ${s.nome} <button class="xbtn" onclick="closeM()">✕</button></div>
  <div class="fg"><div class="fl"><label>Nome</label><input id="en" value="${s.nome}"></div><div class="fl"><label>Valor mín</label><input id="emin" type="number" value="${s.minVal}"></div><div class="fl"><label>Valor médio</label><input id="emed" type="number" value="${s.medVal}"></div><div class="fl"><label>Valor máx</label><input id="emax" type="number" value="${s.maxVal}"></div><div class="fl"><label>Custo material</label><input id="emat" type="number" value="${s.material}"></div><div class="fl"><label>Mão de obra</label><input id="emdo" type="number" value="${s.mdo}"></div><div class="fl"><label>Margem (%)</label><input id="emarg" type="number" value="${s.margem}"></div><div class="fl"><label>Tempo</label><input id="etmp" value="${s.tempo}"></div><div class="fl"><label>Garantia</label><input id="egar" value="${s.garantia}"></div></div>

function salvarEditServ(id){const s=S.services.find(x=>x.id===id);if(!s)return;s.nome=document.getElementById('en').value;s.minVal=+document.getElementById('emin').value;s.medVal=+document.getElementById('emed').value;s.maxVal=+document.getElementById('emax').value;s.material=+document.getElementById('emat').value;s.mdo=+document.getElementById('emdo').value;s.margem=+document.getElementById('emarg').value;s.tempo=document.getElementById('etmp').value;s.garantia=document.getElementById('egar').value;closeM();render();auto();}
function delServ(id){if(confirm('Excluir serviço?')){S.services=S.services.filter(s=>s.id!==id);render();auto();}}
function addToCalc(id){S.calcItems.push({id,qty:1});pg('calc');}
function addCI(){const s=document.getElementById('csel'),q=+document.getElementById('cqty').value||1;if(!s.value)return;const id=+s.value,ex=S.calcItems.find(i=>i.id===id);if(ex)ex.qty+=q;else S.calcItems.push({id,qty:q});render();}
function mNovoOrc(){openM(`<div class="modal-title">Novo Orçamento <button class="xbtn" onclick="closeM()">✕</button></div>
  <div class="fg"><div class="fl"><label>Cliente</label><input id="nc"></div><div class="fl"><label>Telefone</label><input id="nt" placeholder="(11) 99999-9999"></div><div class="fl"><label>Endereço</label><input id="ne" placeholder="Cidade, UF"></div><div class="fl"><label>Valor (R$)</label><input id="nv" type="number"></div><div class="fl"><label>Lucro (R$)</label><input id="nl" type="number"></div><div class="fl"><label>Status</label><select id="ns"><option>Aguardando</option><option>Aprovado</option><option>Recusado</option></select></div><div class="fl"><label>Data</label><input id="nd" type="date" value="${new Date().toISOString().slice(0,10)}"></div><div class="fl"><label>Tempo gasto</label><input id="ntmp" placeholder="Ex: 2h"></div></div>

  <div class="fl" style="margin-top:8px"><label>Observações</label><textarea id="nobs" placeholder="Detalhes, materiais, próximos passos..."></textarea></div>

function salvarNovoOrc(){S.orc.push({id:`ORC-${String(S.nextOrc++).padStart(3,'0')}`,cliente:document.getElementById('nc').value||'Cliente',tel:document.getElementById('nt').value||'—',end:document.getElementById('ne').value||'—',tipo:document.getElementById('ntipo').value||'Serviço técnico',data:document.getElementById('nd').value,valor:+document.getElementById('nv').value||0,status:document.getElementById('ns').value,lucro:+document.getElementById('nl').value||0,tempo:document.getElementById('ntmp').value||'—',obs:document.getElementById('nobs').value||''});closeM();render();auto();}
function mEditOrc(id){const o=S.orc.find(x=>x.id===id);if(!o)return;openM(`<div class="modal-title">Editar ${o.id} <button class="xbtn" onclick="closeM()">✕</button></div>
  <div class="fg"><div class="fl"><label>Cliente</label><input id="ec" value="${o.cliente}"></div><div class="fl"><label>Telefone</label><input id="et" value="${o.tel}"></div><div class="fl"><label>Valor</label><input id="ev" type="number" value="${o.valor}"></div><div class="fl"><label>Lucro</label><input id="el" type="number" value="${o.lucro}"></div><div class="fl"><label>Status</label><select id="es"><option ${o.status==='Aguardando'?'selected':''}>Aguardando</option><option ${o.status==='Aprovado'?'selected':''}>Aprovado</option><option ${o.status==='Recusado'?'selected':''}>Recusado</option></select></div><div class="fl"><label>Tempo</label><input id="etmp" value="${o.tempo}"></div></div>

  <div style="display:flex;gap:8px;margin-top:14px;justify-content:flex-end"><button class="btn ghost" onclick="closeM()">Cancelar</button><button class="btn" onclick="salvarEditOrc('${id}')">Salvar</button></div>`);}
function salvarEditOrc(id){const o=S.orc.find(x=>x.id===id);if(!o)return;o.cliente=document.getElementById('ec').value;o.tel=document.getElementById('et').value;o.valor=+document.getElementById('ev').value;o.lucro=+document.getElementById('el').value;o.status=document.getElementById('es').value;o.tempo=document.getElementById('etmp').value;o.obs=document.getElementById('eobs').value;closeM();render();auto();}
function dupOrc(id){const o=S.orc.find(x=>x.id===id);if(!o)return;S.orc.push({...o,id:`ORC-${String(S.nextOrc++).padStart(3,'0')}`,status:'Aguardando',data:new Date().toISOString().slice(0,10)});render();auto();}
function delOrc(id){if(confirm('Excluir?')){S.orc=S.orc.filter(o=>o.id!==id);render();auto();}}
function mSalvarOrc(total,lucro){openM(`<div class="modal-title">💾 Salvar Orçamento <button class="xbtn" onclick="closeM()">✕</button></div>
  <div style="background:var(--bg4);border-radius:8px;padding:12px;margin-bottom:14px"><div style="font-size:10px;color:var(--text3)">Total</div><div style="font-size:24px;font-weight:700;color:var(--blue3)">${fmtR(+total)}</div><div style="font-size:11px;color:var(--green)">Lucro: ${fmtR(+lucro)}</div></div>

  <div class="fl" style="margin-top:8px"><label>Serviços realizados</label><input id="otipo"></div>

function confirmarSalvarOrc(total,lucro){S.orc.push({id:`ORC-${String(S.nextOrc++).padStart(3,'0')}`,cliente:document.getElementById('oc').value||'Cliente',tel:document.getElementById('ot').value||'—',end:document.getElementById('oe').value||'—',tipo:document.getElementById('otipo').value||'Serviço técnico',data:document.getElementById('od').value,valor:+total,status:document.getElementById('os').value,lucro:+lucro,tempo:document.getElementById('otmp').value||'—',obs:document.getElementById('oobs').value||''});S.calcItems=[];closeM();pg('orc');auto();}
function mNovoCli(){openM(`<div class="modal-title">Novo Cliente <button class="xbtn" onclick="closeM()">✕</button></div>
  <div class="fg"><div class="fl"><label>Nome</label><input id="cn"></div><div class="fl"><label>Telefone</label><input id="ct" placeholder="(11) 99999-9999"></div><div class="fl"><label>E-mail</label><input id="ce"></div><div class="fl"><label>Endereço</label><input id="cend" placeholder="Cidade, UF"></div><div class="fl"><label>Tipo</label><select id="ctipo"><option>Novo</option><option>Recorrente</option><option>VIP</option><option>Inadimplente</option></select></div><div class="fl"><label>Obs</label><input id="cobs"></div></div>
  <div style="display:flex;gap:8px;margin-top:14px;justify-content:flex-end"><button class="btn ghost" onclick="closeM()">Cancelar</button><button class="btn" onclick="salvarNovoCli()">Salvar</button></div>`);}
function salvarNovoCli(){S.clientes.push({id:S.nextCli++,nome:document.getElementById('cn').value||'Cliente',tel:document.getElementById('ct').value||'—',email:document.getElementById('ce').value||'',end:document.getElementById('cend').value||'—',tipo:document.getElementById('ctipo').value,servicos:0,gasto:0,obs:document.getElementById('cobs').value||''});closeM();render();auto();}
function mEditCli(id){const c=S.clientes.find(x=>x.id===id);if(!c)return;openM(`<div class="modal-title">Editar Cliente <button class="xbtn" onclick="closeM()">✕</button></div>
  <div class="fg"><div class="fl"><label>Nome</label><input id="en" value="${c.nome}"></div><div class="fl"><label>Telefone</label><input id="et" value="${c.tel}"></div><div class="fl"><label>E-mail</label><input id="ee" value="${c.email}"></div><div class="fl"><label>Tipo</label><select id="etipo"><option ${c.tipo==='Novo'?'selected':''}>Novo</option><option ${c.tipo==='Recorrente'?'selected':''}>Recorrente</option><option ${c.tipo==='VIP'?'selected':''}>VIP</option><option ${c.tipo==='Inadimplente'?'selected':''}>Inadimplente</option></select></div><div class="fl"><label>Gasto total (R$)</label><input id="eg" type="number" value="${c.gasto}"></div><div class="fl"><label>Nº serviços</label><input id="es2" type="number" value="${c.servicos}"></div></div>
  <div style="display:flex;gap:8px;margin-top:14px;justify-content:flex-end"><button class="btn ghost" onclick="closeM()">Cancelar</button><button class="btn" onclick="salvarEditCli(${id})">Salvar</button></div>`);}
function salvarEditCli(id){const c=S.clientes.find(x=>x.id===id);if(!c)return;c.nome=document.getElementById('en').value;c.tel=document.getElementById('et').value;c.email=document.getElementById('ee').value;c.tipo=document.getElementById('etipo').value;c.gasto=+document.getElementById('eg').value;c.servicos=+document.getElementById('es2').value;closeM();render();auto();}
function delCli(id){if(confirm('Excluir cliente?')){S.clientes=S.clientes.filter(c=>c.id!==id);render();auto();}}
function mNovoEst(){openM(`<div class="modal-title">Novo Item de Estoque <button class="xbtn" onclick="closeM()">✕</button></div>
  <div class="fg"><div class="fl"><label>Nome</label><input id="en"></div><div class="fl"><label>Categoria</label><input id="ec" placeholder="Ex: Hardware, Cabos..."></div><div class="fl"><label>Quantidade</label><input id="eq" type="number" value="1"></div><div class="fl"><label>Qtd mínima</label><input id="eqm" type="number" value="2"></div><div class="fl"><label>Custo unit. (R$)</label><input id="ecu" type="number"></div><div class="fl"><label>Fornecedor</label><input id="ef"></div></div>
  <div style="display:flex;gap:8px;margin-top:14px;justify-content:flex-end"><button class="btn ghost" onclick="closeM()">Cancelar</button><button class="btn" onclick="salvarNovoEst()">Salvar</button></div>`);}
function salvarNovoEst(){S.estoque.push({id:S.nextEst++,nome:document.getElementById('en').value||'Item',cat:document.getElementById('ec').value||'Geral',qtd:+document.getElementById('eq').value||0,qtdMin:+document.getElementById('eqm').value||1,custo:+document.getElementById('ecu').value||0,fornecedor:document.getElementById('ef').value||'—',obs:''});closeM();render();auto();}
function mEntrada(id){const e=S.estoque.find(x=>x.id===id);if(!e)return;openM(`<div class="modal-title">+ Entrada: ${e.nome} <button class="xbtn" onclick="closeM()">✕</button></div>
  <div class="fg"><div class="fl"><label>Quantidade</label><input id="mq" type="number" value="1"></div><div class="fl"><label>Obs</label><input id="mob" value="Compra"></div></div>
  <div style="display:flex;gap:8px;margin-top:14px;justify-content:flex-end"><button class="btn ghost" onclick="closeM()">Cancelar</button><button class="btn success" onclick="confEntrada(${id})">+ Confirmar</button></div>`);}
function confEntrada(id){const e=S.estoque.find(x=>x.id===id);const q=+document.getElementById('mq').value||1;e.qtd+=q;S.movEstoque.unshift({data:new Date().toISOString().slice(0,10),item:e.nome,tipo:'Entrada',qtd:q,obs:document.getElementById('mob').value});closeM();render();auto();}
function mSaida(id){const e=S.estoque.find(x=>x.id===id);if(!e)return;openM(`<div class="modal-title">- Saída: ${e.nome} (${e.qtd} em estoque) <button class="xbtn" onclick="closeM()">✕</button></div>
  <div class="fg"><div class="fl"><label>Quantidade</label><input id="mq" type="number" value="1" max="${e.qtd}"></div><div class="fl"><label>Motivo</label><input id="mob" placeholder="Ex: ORC-006"></div></div>
  <div style="display:flex;gap:8px;margin-top:14px;justify-content:flex-end"><button class="btn ghost" onclick="closeM()">Cancelar</button><button class="btn danger" onclick="confSaida(${id})">- Confirmar</button></div>`);}
function confSaida(id){const e=S.estoque.find(x=>x.id===id);const q=Math.min(+document.getElementById('mq').value||1,e.qtd);e.qtd-=q;S.movEstoque.unshift({data:new Date().toISOString().slice(0,10),item:e.nome,tipo:'Saída',qtd:q,obs:document.getElementById('mob').value});closeM();render();auto();}
function mMovEst(){openM(`<div class="modal-title">📋 Movimentações <button class="xbtn" onclick="closeM()">✕</button></div>
  <div class="tw" style="margin-bottom:0"><table><thead><tr><th>Data</th><th>Item</th><th>Tipo</th><th>Qtd</th><th>Obs</th></tr></thead><tbody>${S.movEstoque.map(m=>`<tr><td style="font-size:11px">${m.data}</td><td style="font-weight:600">${m.item}</td><td><span class="badge ${m.tipo==='Entrada'?'gr':'re'}">${m.tipo}</span></td><td style="font-weight:700;color:${m.tipo==='Entrada'?'var(--green)':'var(--red)'}">${m.tipo==='Entrada'?'+':'-'}${m.qtd}</td><td style="font-size:11px;color:var(--text2)">${m.obs}</td></tr>`).join('')}</tbody></table></div>`);}
function mNovoAg(){openM(`<div class="modal-title">Novo Compromisso <button class="xbtn" onclick="closeM()">✕</button></div>
  <div class="fg"><div class="fl"><label>Título</label><input id="at" placeholder="Ex: João - Formatação"></div><div class="fl"><label>Dia do mês</label><input id="ad" type="number" min="1" max="31" value="11"></div><div class="fl"><label>Horário</label><input id="ah" type="time" value="09:00"></div><div class="fl"><label>Tipo</label><select id="atipo"><option>Serviço</option><option>Instalação</option><option>Orçamento</option><option>Comercial</option><option>Pessoal</option></select></div><div class="fl"><label>Status</label><select id="ast"><option>Confirmado</option><option>Aguardando</option></select></div><div class="fl"><label>Obs</label><input id="ao"></div></div>
  <div style="display:flex;gap:8px;margin-top:14px;justify-content:flex-end"><button class="btn ghost" onclick="closeM()">Cancelar</button><button class="btn" onclick="salvarNovoAg()">Salvar</button></div>`);}
function salvarNovoAg(){S.agenda.push({id:S.nextAg++,dia:+document.getElementById('ad').value||11,titulo:document.getElementById('at').value||'Compromisso',hora:document.getElementById('ah').value||'09:00',status:document.getElementById('ast').value,tipo:document.getElementById('atipo').value,obs:document.getElementById('ao').value||''});closeM();render();auto();}
function delAg(id){if(confirm('Excluir compromisso?')){S.agenda=S.agenda.filter(a=>a.id!==id);render();auto();}}
function toggleAgStatus(id){const a=S.agenda.find(x=>x.id===id);if(!a)return;a.status=a.status==='Confirmado'?'Aguardando':'Confirmado';render();auto();}
function mNovoGasto(){openM(`<div class="modal-title">💸 Novo Gasto <button class="xbtn" onclick="closeM()">✕</button></div>
  <div class="fg"><div class="fl"><label>Descrição</label><input id="gd" placeholder="Ex: Combustível"></div><div class="fl"><label>Valor (R$)</label><input id="gv" type="number"></div><div class="fl"><label>Data</label><input id="gdt" type="date" value="${new Date().toISOString().slice(0,10)}"></div></div>
  <div style="display:flex;gap:8px;margin-top:14px;justify-content:flex-end"><button class="btn ghost" onclick="closeM()">Cancelar</button><button class="btn danger" onclick="salvarGasto()">Registrar</button></div>`);}
function salvarGasto(){const v=+document.getElementById('gv').value||0;S.gastos.push({desc:document.getElementById('gd').value||'Gasto',valor:v,data:document.getElementById('gdt').value});closeM();render();auto();}
function salvarConfig(){
  S.cfg.empresa=document.getElementById('cf-emp').value||S.cfg.empresa;
  S.cfg.sub=document.getElementById('cf-sub').value||S.cfg.sub;
  S.cfg.cnpj=document.getElementById('cf-cnpj').value;
  S.cfg.tel=document.getElementById('cf-tel').value;
  S.cfg.cidade=document.getElementById('cf-cid').value;
  S.cfg.logoText=document.getElementById('cf-logo').value||S.cfg.logoText;
  S.cfg.metaMensal=+document.getElementById('cf-mmen').value||S.cfg.metaMensal;
  S.cfg.metaSemanal=+document.getElementById('cf-msem').value||S.cfg.metaSemanal;
  S.cfg.metaAnual=+document.getElementById('cf-manu').value||S.cfg.metaAnual;
  S.cfg.impostoMEI=+document.getElementById('cf-imei').value||0;
  S.cfg.impostoNF=+document.getElementById('cf-inf').value||0;
  S.cfg.deslBase=+document.getElementById('cf-desb').value||S.cfg.deslBase;
  S.cfg.deslKmExtra=+document.getElementById('cf-deskm').value||S.cfg.deslKmExtra;
  S.cfg.urgencial=+document.getElementById('cf-urg').value||S.cfg.urgencial;
  const maq=S.cfg.maquininha;
  maq.debito=+document.getElementById('maq-deb').value||maq.debito;
  maq.credito1=+document.getElementById('maq-c1').value||maq.credito1;
  for(let p=2;p<=12;p++){const el=document.getElementById('maq-c'+p);if(el)maq['credito'+p]=+el.value||0;}
  const tl=document.getElementById('top-logo');
  if(tl){tl.childNodes[0].textContent=S.cfg.empresa+' ';document.getElementById('top-sub').textContent='· '+S.cfg.sub;}
  alert('✅ Configurações salvas!');
  render();auto();
}
</script>
