<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>GBR Soluções — Sistema de Gestão</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">

<script>
// ═══════════════════════════════════════════════════════════════
//  FIREBASE — carregado antes do DOM
//  SYNC FIX: O echo foi removido. A lógica agora é simples:
//  - Ao receber um snapshot, verifica se _clientId === CLIENT_ID
//    E se o timestamp do snapshot é <= o lastSavedAt local.
//  - Se sim, é um eco desta aba → ignora.
//  - Caso contrário → aplica os dados (veio de outro dispositivo).
// ═══════════════════════════════════════════════════════════════

const CLIENT_ID = Math.random().toString(36).slice(2,9) + Date.now().toString(36);
window.CLIENT_ID = CLIENT_ID;
let lastSavedAt = 0; // timestamp do último save feito NESTA aba

function setSS(type, msg){
  const dot = document.getElementById('sdot');
  const sm  = document.getElementById('smsg');
  if(!dot || !sm) return;
  dot.className = 'sync-dot ' + (type === 'ok' ? 'ok' : type === 'err' ? 'err' : type === 'warn' ? 'warn' : 'loading');
  sm.textContent = msg;
}
window.setSS = setSS;

let db, dbRef, saveTO, storage;
let authInstance = null;
let dbListener = null;
let _firebase = null;
let _pendingSave = false;

function getAuthInstance(){ return authInstance; }
window.getAuthInstance = getAuthInstance;

const firebaseConfig = {
  apiKey: "AIzaSyAPYCe1CJkksTdoinfLQpv6ety0OheqyOc",
  authDomain: "sistemagbr-f6b4e.firebaseapp.com",
  databaseURL: "https://sistemagbr-f6b4e-default-rtdb.firebaseio.com",
  projectId: "sistemagbr-f6b4e",
  storageBucket: "sistemagbr-f6b4e.firebasestorage.app",
  messagingSenderId: "549796148409",
  appId: "1:549796148409:web:cbc828cca4b114882d5768"
};

async function initFB(){
  try {
    const { initializeApp }                   = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js');
    const { getDatabase, ref, set, remove, onValue }  = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js');
    const { getAuth, signInWithEmailAndPassword, onAuthStateChanged } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js');
    const { getStorage, ref: sRef, uploadBytes, getDownloadURL, deleteObject } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js');

    _firebase = { initializeApp, getDatabase, ref, set, remove, onValue, getAuth, signInWithEmailAndPassword, onAuthStateChanged, getStorage, sRef, uploadBytes, getDownloadURL, deleteObject };

    const app = initializeApp(firebaseConfig);
    db  = getDatabase(app);
    authInstance = getAuth(app);
    storage = getStorage(app);
    dbRef = ref(db, 'gbr/dados');

    onAuthStateChanged(authInstance, user => {
      if(user){
        document.getElementById('lscreen').style.display = 'none';
        document.getElementById('approot').style.display = 'flex';
        setSS('loading','Conectando...');
        setTimeout(iniciarListenerChamados, 2000); // ouve novos chamados do cliente

        if(dbListener) dbListener(); // remove listener antigo

        dbListener = onValue(dbRef, snap => {
          if(!snap.exists()){
            // Firebase vazio — push dados locais
            window.fbSave();
            return;
          }
          const data = snap.val();
          // ── SYNC FIX: É eco desta aba se veio de mim e é recente ──
          const isMyEcho = (data._clientId === CLIENT_ID) && (data._savedAt >= lastSavedAt - 100);
          if(isMyEcho){ 
            setSS('ok','Salvo — ' + new Date().toLocaleTimeString('pt-BR'));
            return;
          }
          // Veio de outro dispositivo → aplica
          applyRemoteData(data);
          safeRender();
          setSS('ok','Sincronizado — ' + new Date().toLocaleTimeString('pt-BR'));
        }, err => {
          setSS('err','Erro: ' + err.message);
        });

      } else {
        document.getElementById('lscreen').style.display = 'flex';
        document.getElementById('approot').style.display = 'none';
        setSS('err','Faça login para acessar');
      }
    });

  } catch(e){
    setSS('err','Firebase: ' + e.message);
  }
}

window.fbSave = async function(){
  if(!getAuthInstance() || !getAuthInstance().currentUser){
    setSS('err','Desconectado. Faça login novamente.');
    return;
  }
  if(_pendingSave) return; // evita save duplo simultâneo
  _pendingSave = true;
  setSS('loading','Salvando...');
  try {
    const payload = buildPayload();
    lastSavedAt = payload._savedAt; // registra o timestamp ANTES do set
    await _firebase.set(dbRef, payload);
    lSave();
    setSS('ok','Salvo — ' + new Date().toLocaleTimeString('pt-BR'));
  } catch(e){
    lSave();
    setSS('err','Erro ao salvar: ' + e.message);
  } finally {
    _pendingSave = false;
  }
};

function doLogin(){
  const email = document.getElementById('lemail').value.trim();
  const pass  = document.getElementById('lpass').value;
  const errEl = document.getElementById('lerr');
  if(!email || !pass){ errEl.textContent = 'Preencha email e senha.'; return; }
  const auth = getAuthInstance();
  if(!auth){ errEl.textContent = 'Firebase não inicializado. Recarregue.'; return; }
  errEl.textContent = 'Entrando...';
  _firebase.signInWithEmailAndPassword(auth, email, pass)
    .then(() => { errEl.textContent = ''; })
    .catch(() => {
      errEl.textContent = 'Email ou senha incorretos.';
      document.getElementById('lpass').value = '';
      setTimeout(() => errEl.textContent = '', 3000);
    });
}
window.doLogin = doLogin;

window.scheduleSave = function(){ clearTimeout(saveTO); saveTO = setTimeout(() => window.fbSave(), 1500); };

document.addEventListener('DOMContentLoaded', initFB);
</script>

.badge.tx::before { display: none; }

/* Tags */
.tag {
  display: inline-flex; align-items: center;
  background: var(--surface3); border: 1px solid var(--border);
  border-radius: 4px; padding: 2px 7px;
  font-size: 10px; color: var(--muted);
}

/* Row layout */
.row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px; }

/* Tabelas */
.tw { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 12px; overflow-x: auto; }
table { width: 100%; border-collapse: collapse; table-layout: fixed; min-width: 460px; }
th { background: var(--surface2); color: var(--muted2); font-size: 10px; text-transform: uppercase; letter-spacing: .06em; padding: 10px 12px; text-align: left; border-bottom: 1px solid var(--border); font-family: 'Syne', sans-serif; font-weight: 600; }

tr:last-child td { border-bottom: none; }
tr:hover td { background: var(--surface2); }

/* Busca */
.sb {
  background: var(--surface3); border: 1px solid var(--border);
  border-radius: var(--radius-xs); padding: 8px 12px;
  color: var(--text); font-size: 12px; width: 100%; outline: none;
  font-family: 'DM Sans', sans-serif; transition: border-color .2s;
}
.sb:focus { border-color: var(--primary); }

/* Formulários */
.fg { display: grid; grid-template-columns: repeat(auto-fit, minmax(185px, 1fr)); gap: 10px; }
.fl { display: flex; flex-direction: column; gap: 4px; }
.fl label { font-size: 10px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: .4px; }
.fl input, .fl select, .fl textarea {
  background: var(--surface3); border: 1px solid var(--border);
  color: var(--text); border-radius: var(--radius-xs); padding: 8px 11px;
  font-size: 12px; outline: none; transition: border-color .2s; width: 100%;
  font-family: 'DM Sans', sans-serif;
}
.fl input:focus, .fl select:focus, .fl textarea:focus { border-color: var(--primary); }
.fl select option { background: var(--surface2); }
.fl textarea { resize: vertical; min-height: 65px; }

/* Seção header */
.sh { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; gap: 8px; flex-wrap: wrap; }
.sh-t { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 800; letter-spacing: -.3px; display: flex; align-items: center; gap: 8px; }

/* Modal */
.modal-ov { position: fixed; inset: 0; background: rgba(0,0,0,.7); backdrop-filter: blur(4px); z-index: 999; display: flex; align-items: center; justify-content: center; padding: 16px; }
.modal { background: var(--surface); border: 1px solid var(--border2); border-radius: 16px; padding: 22px; width: min(720px, 100%); max-height: 92vh; overflow-y: auto; }
.modal-t { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; margin-bottom: 18px; display: flex; justify-content: space-between; align-items: center; gap: 10px; }
.xbtn { background: transparent; border: 1px solid var(--border); color: var(--muted); cursor: pointer; font-size: 14px; width: 28px; height: 28px; border-radius: 6px; display: grid; place-items: center; transition: all .15s; }
.xbtn:hover { border-color: var(--border2); color: var(--text); }

/* Alertas */
.alert { border-radius: var(--radius-xs); padding: 10px 14px; margin-bottom: 10px; font-size: 12px; display: flex; align-items: flex-start; gap: 8px; flex-wrap: wrap; }
.alert.warn   { background: rgba(245,197,24,.08); border: 1px solid rgba(245,197,24,.25); color: var(--yellow); }
.alert.danger { background: rgba(255,78,106,.08); border: 1px solid rgba(255,78,106,.25); color: var(--red); }
.alert.ok     { background: rgba(34,215,135,.08); border: 1px solid rgba(34,215,135,.25); color: var(--green); }
.alert.info   { background: rgba(124,77,255,.08); border: 1px solid rgba(124,77,255,.25); color: var(--primary2); }
.alert.pink   { background: rgba(236,72,153,.08); border: 1px solid rgba(236,72,153,.25); color: var(--pink); }

/* Progress */
.prog { height: 5px; background: var(--surface3); border-radius: 3px; overflow: hidden; margin-top: 5px; }
.prog-f { height: 100%; border-radius: 3px; background: linear-gradient(90deg, var(--primary), var(--accent)); }
.prog-f.gr { background: var(--green); }
.prog-f.am { background: var(--yellow); }
.prog-f.re { background: var(--red); }

/* Bar chart */
.bar-chart { display: flex; flex-direction: column; gap: 7px; }
.bar-row { display: flex; align-items: center; gap: 8px; min-width: 0; }
.bar-lbl { width: 100px; font-size: 11px; color: var(--muted); text-align: right; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex-shrink: 0; }
.bar-track { flex: 1; background: var(--surface3); border-radius: 3px; height: 14px; min-width: 0; overflow: hidden; }
.bar-f { height: 100%; border-radius: 3px; background: linear-gradient(90deg, var(--primary), var(--accent)); transition: width .4s; }
.bar-val { width: 65px; font-size: 11px; text-align: right; flex-shrink: 0; color: var(--primary2); font-weight: 600; }

/* Mini list */
.mini-list { display: flex; flex-direction: column; gap: 6px; }
.mi { display: flex; align-items: center; justify-content: space-between; padding: 8px 10px; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-xs); font-size: 12px; gap: 8px; min-width: 0; transition: border-color .15s; }
.mi:hover { border-color: var(--border2); }

/* Sub-tabs */
.stabs { display: flex; gap: 2px; margin-bottom: 16px; border-bottom: 1px solid var(--border); padding-bottom: 0; flex-wrap: wrap; }
.stab { background: transparent; border: none; color: var(--muted); padding: 8px 14px; cursor: pointer; font-size: 12px; border-radius: 6px 6px 0 0; white-space: nowrap; font-family: 'DM Sans', sans-serif; transition: color .15s; }
.stab.active { color: var(--primary2); border-bottom: 2px solid var(--primary); margin-bottom: -1px; }
.stab:hover { color: var(--text); }

/* Calendário */
.cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 3px; margin-bottom: 8px; }
.cal-hdr { display: grid; grid-template-columns: repeat(7,1fr); gap: 3px; margin-bottom: 5px; }
.cal-hdr span { text-align: center; font-size: 10px; color: var(--muted2); font-weight: 600; text-transform: uppercase; font-family: 'Syne', sans-serif; }
.cal-day { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 5px 4px; text-align: center; min-height: 52px; font-size: 11px; color: var(--muted); }
.cal-day.has-ev { border-color: rgba(124,77,255,.3); }
.cal-day.today { border-color: var(--primary); background: rgba(124,77,255,.08); }
.cal-day .dn { font-weight: 700; font-size: 12px; color: var(--text); margin-bottom: 2px; }
.cal-ev { font-size: 9px; background: rgba(124,77,255,.25); border-radius: 3px; padding: 1px 3px; margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--primary2); }
.cal-ev.am { background: rgba(245,197,24,.2); color: var(--yellow); }
.cal-ev.gr { background: rgba(34,215,135,.15); color: var(--green); }

/* Filtros */
.filter-row { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; align-items: center; }
.filter-row select { background: var(--surface3); border: 1px solid var(--border); color: var(--text); border-radius: var(--radius-xs); padding: 7px 10px; font-size: 12px; outline: none; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: border-color .2s; }
.filter-row select:focus { border-color: var(--primary); }
.filter-row select option { background: var(--surface2); }

/* Category chips */
.cat-chip { display: inline-flex; align-items: center; gap: 5px; border: 1px solid var(--border); border-radius: 20px; padding: 3px 10px; font-size: 11px; color: var(--muted); margin: 3px; cursor: pointer; background: var(--surface2); transition: all .15s; }
.cat-chip:hover { border-color: var(--border2); color: var(--text); }
.cat-chip.sel { background: rgba(124,77,255,.15); color: var(--primary2); border-color: rgba(124,77,255,.4); }
.cat-chip .x { background: transparent; border: none; color: inherit; cursor: pointer; font-size: 12px; padding: 0 0 0 4px; opacity: .7; }
.cat-chip .x:hover { opacity: 1; }

/* Orçamento linha */
.odr { display: flex; gap: 8px; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 12px; }
.odr-l { color: var(--muted); width: 120px; flex-shrink: 0; font-size: 11px; text-transform: uppercase; letter-spacing: .3px; padding-top: 1px; }
.odr-v { color: var(--text); flex: 1; white-space: pre-wrap; word-break: break-word; }

/* Depoimentos */
.dep-card { background: var(--surface); border: 1px solid rgba(236,72,153,.2); border-radius: var(--radius); padding: 14px; }

/* Config sections */
.cs { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 14px; }
.cs-t { font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 14px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }

/* Stars */
.star { color: var(--yellow); font-size: 13px; }
.star.off { color: var(--muted2); }

/* ══════════════════════════════════════════════════════
   MOBILE (sidebar vira bottom nav)
══════════════════════════════════════════════════════ */
/* ══════════════════════════════════════════════════════
   MOBILE OPTIMIZED — v2.0
   Layout: Top header com hamburger + Bottom nav rápido
══════════════════════════════════════════════════════ */
@media (max-width: 768px) {
  body { font-size: 14px; padding-bottom: 64px; }
  #approot { flex-direction: column; }

  /* ── SIDEBAR vira drawer lateral (escondida por padrão) ── */
  .sidebar {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100vh;
    z-index: 200;
    background: rgba(13,11,26,0.95);
    backdrop-filter: blur(12px);
    border-right: none;
    transform: translateX(-100%);
    transition: transform .3s ease;
    flex-direction: column;
    padding: 0;
  }
  .sidebar.open { transform: translateX(0); }
  .sidebar::before { display: none; }

  .sidebar-header-mobile {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
  }
  .sidebar-close {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    width: 36px;
    height: 36px;
    border-radius: 8px;
    font-size: 18px;
    cursor: pointer;
    display: grid;
    place-items: center;
  }
  .sidebar-close:hover { border-color: var(--border2); color: var(--text); }

  .sidebar-logo {
    padding: 0;
    border-bottom: none;
    border-right: none;
  }
  .sidebar-nav {
    flex: 1;
    flex-direction: column;
    padding: 8px 12px;
    overflow-y: auto;
    overflow-x: hidden;
    gap: 0;
  }
  .nav-section { margin-bottom: 8px; }
  .nav-label { display: block; padding: 10px 8px 4px; }
  .nav-item {
    flex-direction: row;
    gap: 10px;
    padding: 10px 12px;
    min-width: auto;
    justify-content: flex-start;
    font-size: 13px;
    margin-bottom: 2px;
  }
  .nav-item.active::before {
    left: 0; right: auto; top: 20%; bottom: 20%;
    width: 3px; height: auto;
    border-radius: 3px;
  }
  .nav-icon { font-size: 16px; width: 22px; }
  .nav-item span:not(.nav-icon) { font-size: 13px; }
  .sidebar-footer {
    display: block;
    padding: 10px 12px;
    border-top: 1px solid var(--border);
  }

  /* ── MOBILE TOP HEADER ── */
  .mobile-header {
    display: flex !important;
    align-items: center;
    justify-content: space-between;
    padding: 0 14px;
    height: 52px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 50;
    gap: 10px;
  }
  .mobile-header .mh-logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 16px;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .mobile-header .mh-logo span {
    display: block;
    font-size: 9px;
    font-weight: 400;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    letter-spacing: 0;
  }
  .mobile-header .mh-actions {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
  }
  .mobile-header .mh-btn {
    width: 36px;
    height: 36px;
    border-radius: 8px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 16px;
    cursor: pointer;
    display: grid;
    place-items: center;
    transition: all .15s;
  }
  .mobile-header .mh-btn:hover { border-color: var(--primary); color: var(--text); }
  .mobile-header .mh-btn.primary {
    background: linear-gradient(135deg, var(--primary), var(--accent));
    border-color: transparent;
    color: #fff;
    width: auto;
    padding: 0 12px;
    font-size: 12px;
    font-weight: 600;
    font-family: 'DM Sans', sans-serif;
    gap: 4px;
    display: flex;
  }

  /* ── BOTTOM NAVIGATION ── */
  .bottom-nav {
    display: flex !important;
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: 56px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    z-index: 100;
    justify-content: space-around;
    align-items: center;
    padding: 0 4px;
    padding-bottom: env(safe-area-inset-bottom, 0);
  }
  .bottom-nav .bn-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
    padding: 4px 2px;
    border-radius: 8px;
    cursor: pointer;
    color: var(--muted);
    font-size: 9px;
    transition: all .15s;
    border: none;
    background: transparent;
    font-family: 'DM Sans', sans-serif;
    max-width: 64px;
  }
  .bottom-nav .bn-item:hover { color: var(--text); }
  .bottom-nav .bn-item.active {
    color: var(--primary2);
  }
  .bottom-nav .bn-item .bn-icon {
    font-size: 20px;
    line-height: 1;
    position: relative;
  }
  .bottom-nav .bn-item.active .bn-icon::after {
    content: '';
    position: absolute;
    bottom: -4px;
    left: 50%;
    transform: translateX(-50%);
    width: 16px;
    height: 3px;
    border-radius: 2px;
    background: linear-gradient(90deg, var(--primary), var(--accent));
  }
  .bottom-nav .bn-item .bn-label {
    font-size: 9px;
    font-weight: 500;
    white-space: nowrap;
  }
  .bottom-nav .bn-more {
    position: relative;
  }
  .bottom-nav-more-menu {
    position: absolute;
    bottom: 60px;
    right: 8px;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 12px;
    padding: 8px;
    min-width: 160px;
    box-shadow: 0 -8px 32px rgba(0,0,0,.4);
    display: none;
    flex-direction: column;
    gap: 2px;
  }
  .bottom-nav-more-menu.show { display: flex; }
  .bottom-nav-more-menu .bnm-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    border-radius: 8px;
    color: var(--muted);
    font-size: 13px;
    cursor: pointer;
    background: transparent;
    border: none;
    font-family: 'DM Sans', sans-serif;
    text-align: left;
  }
  .bottom-nav-more-menu .bnm-item:hover { background: var(--surface3); color: var(--text); }
  .bottom-nav-more-menu .bnm-item.active { color: var(--primary2); background: rgba(124,77,255,0.1); }

  /* ── TOPBAR desktop escondida ── */
  .topbar { display: none !important; }

  /* ── CONTENT ── */
  .content { padding: 12px; padding-bottom: 80px; }
  .row2 { grid-template-columns: 1fr !important; }
  .kpi-grid { grid-template-columns: repeat(2, 1fr) !important; }
  .fl input, .fl select, .fl textarea, .sb { padding: 10px 12px; font-size: 16px; min-height: 44px; }
  .btn { min-height: 40px; }
  .fg { grid-template-columns: 1fr !important; }
  .modal-ov { padding: 8px; align-items: flex-end; }
  .modal { border-radius: 14px 14px 0 0; max-height: 85vh; width: 100%; }
  table { min-width: 320px; }

  /* ── CALCULADORA mobile ── */
  .calc-grid { grid-template-columns: 1fr !important; }

  /* ── OS CARD mobile ── */
  .os-card-main { flex-direction: column !important; gap: 10px !important; }
  .os-card-main > div { text-align: left !important; min-width: auto !important; }
  .os-card-actions { flex-direction: row !important; width: 100%; }
  .os-card-actions button { flex: 1; }

  /* ── SWIPE CARDS mobile (substitui tabela em Orçamentos/CRM) ── */
  .mobile-card-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; }

  .swipe-card-wrap {
    position: relative;
    border-radius: var(--radius);
    overflow: hidden;
    touch-action: pan-y;
    user-select: none;
  }
  /* Painel de ações que fica atrás (revelado ao deslizar) */
  .swipe-actions {
    position: absolute;
    right: 0; top: 0; bottom: 0;
    display: flex;
    align-items: stretch;
  }
  .swipe-action-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 0 16px;
    font-size: 18px;
    gap: 3px;
    border: none;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 10px;
    font-weight: 600;
    min-width: 62px;
    transition: opacity .15s;
    color: #fff;
  }
  .swipe-action-btn .sa-icon { font-size: 18px; }
  .swipe-action-btn.sa-view   { background: var(--surface4); color: var(--primary2); }
  .swipe-action-btn.sa-edit   { background: rgba(20,184,166,.85); }
  .swipe-action-btn.sa-dup    { background: rgba(124,77,255,.85); }
  .swipe-action-btn.sa-del    { background: rgba(255,78,106,.85); }
  /* O card em si, que desliza */
  .swipe-card-inner {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
    position: relative;
    z-index: 2;
    transition: transform .15s ease, box-shadow .15s;
    will-change: transform;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .swipe-card-wrap.swiped .swipe-card-inner {
    box-shadow: -4px 0 16px rgba(0,0,0,.3);
  }
  .swipe-card-row1 {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 8px;
  }
  .swipe-card-name { font-weight: 700; font-size: 14px; color: var(--text); }
  .swipe-card-sub  { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .swipe-card-row2 {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .swipe-card-valor { font-weight: 800; font-size: 15px; color: var(--primary2); font-family: 'Syne', sans-serif; }
  .swipe-card-lucro { font-size: 11px; color: var(--green); }
  .swipe-card-hint  {
    font-size: 10px; color: var(--muted2);
    text-align: center; margin-top: 4px;
    display: flex; align-items: center; justify-content: flex-end; gap: 4px;
  }
  /* Esconde a tabela normal no mobile para as páginas que usam card */
  .mobile-hide-table { display: none !important; }
  .mobile-show-cards { display: flex !important; }
}

/* Desktop: esconde elementos mobile */
.mobile-header { display: none; }
.bottom-nav { display: none; }
.sidebar-header-mobile { display: none; }
/* Mobile card lists: escondidas no desktop */
.mobile-card-list { display: none; }

    _clientId: window.CLIENT_ID,
    _savedAt: Date.now(),
    updatedAt: new Date().toISOString()
  };
}

function applyRemoteData(d){
  // Preserva estado de UI (navegação, filtros, calculadora)
  const ui = {
    page:S.page, crmTab:S.crmTab, estTab:S.estTab, finTab:S.finTab,
    srvQ:S.srvQ, srvCat:S.srvCat, orcQ:S.orcQ, cliQ:S.cliQ,
    estQ:S.estQ, leadQ:S.leadQ,
    calcItems:S.calcItems, calcMode:S.calcMode,
    calcDesc:S.calcDesc, calcUrg:S.calcUrg, calcDesl:S.calcDesl, calcCom:S.calcCom
  };
  // Substitui dados com Firebase como fonte da verdade
  ['services','orc','os','clientes','leads','garantias','estoque','movEstoque',
   'agenda','gastos','categorias','notas','recExtras'].forEach(k => {
    if(d[k] !== undefined) S[k] = d[k];
  });
  if(d.cfg) Object.assign(S.cfg, d.cfg);
  if(Array.isArray(d.chamadosRejeitados)) S.chamadosRejeitados = d.chamadosRejeitados;
  ['nextOrc','nextEst','nextCli','nextAg','nextLead','nextGar',
   'nextNota','nextRecExtra','nextGasto','nextOS'].forEach(k => {
    if(d[k] !== undefined) S[k] = d[k];
  });
  Object.assign(S, ui);
  lSave();
}

// localStorage: apenas cache offline — NÃO é fonte da verdade
function lSave(){
  try { localStorage.setItem('gbr_v2', JSON.stringify(buildPayload())); } catch(e){}
}
function lLoad(){
  try {
    const r = localStorage.getItem('gbr_v2') || localStorage.getItem('gbr_data');
    if(r){ applyLocalData(JSON.parse(r)); return true; }
  } catch(e){}
  return false;
}
function applyLocalData(d){
  // mesma lógica mas sem atualizar localStorage (evita loop)
  ['services','orc','os','clientes','leads','garantias','estoque','movEstoque',
   'agenda','gastos','categorias','notas','recExtras'].forEach(k => {
    if(d[k] !== undefined) S[k] = d[k];
  });
  if(d.cfg) Object.assign(S.cfg, d.cfg);
  ['nextOrc','nextEst','nextCli','nextAg','nextLead','nextGar',
   'nextNota','nextRecExtra','nextGasto','nextOS'].forEach(k => {
    if(d[k] !== undefined) S[k] = d[k];
  });
}
function exportJSON(){
  const b = new Blob([JSON.stringify(buildPayload(),null,2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(b);
  a.download = 'gbr-backup-' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
}
function handleImport(e){
  const f = e.target.files[0];
  if(!f) return;
  const r = new FileReader();
  r.onload = ev => {
    try { applyLocalData(JSON.parse(ev.target.result)); render(); lSave(); }
    catch(x){ alert('Arquivo inválido'); }
  };
  r.readAsText(f);
  e.target.value = '';
}
function auto(){ window.scheduleSave && window.scheduleSave(); }
lLoad(); // carrega cache offline

function safeRender(){
  const active = document.activeElement;
  const wasId  = active && active.id ? active.id : null;
  const wasSel = (active && active.tagName === 'INPUT') ? active.selectionStart : null;
  render();
  if(wasId){ const el = document.getElementById(wasId); if(el){ el.focus(); if(wasSel !== null) try{ el.setSelectionRange(wasSel, wasSel); }catch(e){} } }
}

  const garExp= S.garantias.filter(g=>{const d=dR(g.dataServico,g.diasGarantia);return d>0&&d<=7;}).length;
  const osAbertas  = (S.os||[]).filter(o=>o.status==='Aberta').length;
  const osUrgentes = (S.os||[]).filter(o=>o.prioridade==='Urgente'&&!['Concluida','Entregue','Cancelada'].includes(o.status)).length;
  const osChamados = (S.os||[]).filter(o=>o.origem==='cliente'&&o.status==='Aberta').length;

  // Situações das OS
  const osStatusList = ['Aberta','Diagnóstico','Em Execução','Aguardando Peça','Concluída','Entregue','Cancelada'];
  const osStatusColors = {
    'Aberta':          'var(--yellow)',
    'Diagnóstico':     'var(--primary2)',
    'Em Execução':     'var(--accent)',
    'Aguardando Peça': 'var(--cyan)',
    'Concluída':       'var(--green)',
    'Entregue':        'var(--green)',
    'Cancelada':       'var(--red)'
  };
  const osStatusEmoji = {
    'Aberta':'🔓','Diagnóstico':'🔍','Em Execução':'⚙️',
    'Aguardando Peça':'📦','Concluída':'✅','Entregue':'🚀','Cancelada':'❌'
  };
  const osStatusCount = {};
  osStatusList.forEach(st => { osStatusCount[st] = (S.os||[]).filter(o=>o.status===st).length; });
  const maxOsCount = Math.max(...Object.values(osStatusCount), 1);

  return `
  <div class="sh">
    <div class="sh-t">Dashboard <span style="font-size:12px;font-weight:400;color:var(--muted);font-family:'DM Sans',sans-serif">${hoje.toLocaleDateString('pt-BR',{month:'long',year:'numeric'})}</span></div>
  </div>
  ${osChamados>0?`<div class="alert warn" style="background:rgba(245,197,24,.08);border-color:rgba(245,197,24,.3);color:var(--yellow)">🔔 <strong>${osChamados} chamado(s)</strong> aguardando triagem <button class="btn warn sm" style="margin-left:8px" onclick="S.osTab='abertas';pg('os')">Ver OS</button></div>`:''}
  ${osUrgentes>0?`<div class="alert danger">🚨 <strong>${osUrgentes} OS urgente(s)</strong> em aberto <button class="btn danger sm" style="margin-left:8px" onclick="pg('os')">Ver OS</button></div>`:''}
  ${baixoEst>0?`<div class="alert warn">⚠️ ${baixoEst} item(ns) com estoque baixo <button class="btn warn sm" style="margin-left:8px" onclick="pg('estoque')">Ver estoque</button></div>`:''}
  ${fuHoje>0?`<div class="alert" style="background:rgba(236,72,153,.08);border:1px solid rgba(236,72,153,.25);color:var(--pink)">📱 ${fuHoje} follow-up(s) pendente(s) para hoje <button class="btn pk sm" style="margin-left:8px" onclick="pg('crm')">Ver CRM</button></div>`:''}
  ${garExp>0?`<div class="alert warn">🛡️ ${garExp} garantia(s) vencendo em 7 dias <button class="btn warn sm" style="margin-left:8px" onclick="S.crmTab='garantias';pg('crm')">Ver</button></div>`:''}
  <div class="kpi-grid">
    <div class="kpi bl"><div class="kpi-l">Faturamento</div><div class="kpi-v">${R(fat)}</div><div class="kpi-s">${aprov.length} serviços aprovados</div></div>
    <div class="kpi gr"><div class="kpi-l">Lucro líquido</div><div class="kpi-v">${R(saldo)}</div><div class="kpi-s">após gastos</div></div>
    <div class="kpi am"><div class="kpi-l">Ticket médio</div><div class="kpi-v">${R(tk)}</div></div>
    <div class="kpi pu"><div class="kpi-l">Clientes</div><div class="kpi-v">${S.clientes.length}</div><div class="kpi-s">${S.clientes.filter(c=>c.tipo==='VIP').length} VIP</div></div>
    <div class="kpi tl"><div class="kpi-l">Leads ativos</div><div class="kpi-v">${S.leads.filter(l=>!l.status.includes('Fechado')).length}</div><div class="kpi-s">${R(S.leads.filter(l=>!l.status.includes('Fechado')).reduce((a,l)=>a+l.valorEst,0))} potencial</div></div>
    <div class="kpi am" style="cursor:pointer" onclick="pg('os')"><div class="kpi-l">OS abertas</div><div class="kpi-v">${(S.os||[]).filter(o=>['Aberta','Diagn\u00f3stico','Em Execu\u00e7\u00e3o','Aguardando Pe\u00e7a'].includes(o.status)).length}</div><div class="kpi-s">${osChamados} via chamado cliente</div></div>
    <div class="kpi"><div class="kpi-l">Meta mensal</div><div class="kpi-v" style="color:var(--text)">${R(S.cfg.metaMensal)}</div><div class="prog"><div class="prog-f ${pct>=100?'gr':pct>=60?'am':'re'}" style="width:${pct}%"></div></div><div class="kpi-s">${pct}% atingido</div></div>
  </div>
  <div class="row2">
    <div class="card" style="cursor:pointer" onclick="pg('os')"><div class="card-t">📋 Situação das OS <span style="font-size:10px;color:var(--muted);font-weight:400;margin-left:6px">${(S.os||[]).length} total</span></div><div style="padding:14px 16px">
      ${(S.os||[]).length === 0
        ? `<div style="color:var(--muted);text-align:center;padding:20px;font-size:12px">Nenhuma OS cadastrada.<br><button class="btn" style="margin-top:10px" onclick="pg('os');event.stopPropagation()">Ir para OS →</button></div>`
        : `<div class="bar-chart">${osStatusList.map(st=>{
            const cnt = osStatusCount[st];
            const pct = maxOsCount>0?Math.round(cnt/maxOsCount*100):0;
            const col = osStatusColors[st];
            const em  = osStatusEmoji[st];
            return `<div class="bar-row">
              <div class="bar-lbl" style="width:115px;text-align:right;display:flex;align-items:center;justify-content:flex-end;gap:4px">
                <span style="font-size:11px">${em}</span>
                <span style="font-size:11px;color:var(--muted)">${st}</span>
              </div>
              <div class="bar-track"><div class="bar-f" style="width:${pct}%;background:${col};opacity:${cnt===0?'.25':'1'}"></div></div>
              <div class="bar-val" style="color:${col};min-width:28px;text-align:right">${cnt}</div>
            </div>`;
          }).join('')}</div>`
      }
    </div></div>
    <div class="card"><div class="card-t">📱 Follow-ups pendentes</div><div style="padding:10px 16px"><div class="mini-list">
      ${S.clientes.filter(c=>c.followupData&&c.followupStatus==='Pendente').slice(0,5).map(c=>{
        const d = Math.ceil((new Date(c.followupData)-hoje)/864e5);
        return `<div class="mi"><div><div style="font-weight:600">${c.nome}</div><div style="font-size:10px;color:var(--muted)">${new Date(c.followupData).toLocaleDateString('pt-BR')}</div></div><span class="badge ${d<=0?'re':d<=3?'am':'gr'}">${d<=0?'HOJE':d+'d'}</span></div>`;
      }).join('') || '<div style="color:var(--muted);text-align:center;padding:14px;font-size:12px">Nenhum pendente</div>'}
    </div></div></div>
  </div>
  <div class="row2">
    <div class="card"><div class="card-t">🛡️ Garantias próximas do vencimento</div><div style="padding:10px 16px"><div class="mini-list">
      ${[...S.garantias].map(g=>({...g,d:dR(g.dataServico,g.diasGarantia)})).sort((a,b)=>a.d-b.d).slice(0,4).map(g=>`<div class="mi"><div><div style="font-weight:600">${g.cliente}</div><div style="font-size:10px;color:var(--muted)">${g.servico}</div></div><span class="badge ${g.d<=0?'re':g.d<=14?'am':'gr'}">${g.d<=0?'Vencida':g.d+'d'}</span></div>`).join('') || '<div style="color:var(--muted);text-align:center;padding:14px;font-size:12px">Nenhuma garantia</div>'}
    </div></div></div>
    <div class="card"><div class="card-t">💡 Análise rápida</div><div style="padding:10px 16px"><div class="mini-list">
      <div class="mi"><span>Taxa de aprovação</span><span style="color:var(--green);font-weight:700">${S.orc.length?Math.round(aprov.length/S.orc.length*100):0}%</span></div>
      <div class="mi"><span>Margem média</span><span style="color:var(--green);font-weight:700">${fat?Math.round(lucro/fat*100):0}%</span></div>
      <div class="mi"><span>Gastos do mês</span><span style="color:var(--red);font-weight:700">${R(gastoT)}</span></div>
      <div class="mi"><span>Meta diária</span><span style="color:var(--yellow);font-weight:700">${R(S.cfg.metaMensal/22)}</span></div>
      <div class="mi"><span>Depoimentos</span><span style="color:var(--pink);font-weight:700">${S.clientes.filter(c=>c.depoimento).length}</span></div>
    </div></div></div>
  </div>`;
}

// ═══════════════════════════════════════════
function rCalc(){
  const mk  = {minimo:'minVal',medio:'medVal',premium:'maxVal'};
  const key = mk[S.calcMode];
  const sub = S.calcItems.reduce((a,i)=>{ const s=S.services.find(x=>x.id===i.id); return a+(s?s[key]*i.qty:0); },0);
  const desl= sub*S.calcDesl/100, urg=sub*S.calcUrg/100, desc=sub*S.calcDesc/100, com=sub*S.calcCom/100;
  const custoT = S.calcItems.reduce((a,i)=>{ const s=S.services.find(x=>x.id===i.id); return a+(s?(s.material+s.mdo)*i.qty:0); },0);
  const total  = sub+desl+urg-desc;
  const lucro  = total-custoT-com;
  const marg   = total>0?Math.round(lucro/total*100):0;
  const maq    = S.cfg.maquininha;
  const cm     = p=>{ const t=p===1?maq.credito1:maq['credito'+p]||0; return total*(1+t/100); };
  return `
  <div class="sh"><div class="sh-t">Calculadora de Orçamento</div><button class="btn" onclick="mSalvarOrc(${total.toFixed(2)},${lucro.toFixed(2)})">💾 Salvar Orçamento</button></div>
  <div style="display:grid;grid-template-columns:1fr 340px;gap:14px;min-width:0" class="calc-grid">
    <div>
      <div class="card" style="margin-bottom:12px"><div class="card-t">Serviços</div><div style="padding:14px 16px">
        <div style="display:flex;gap:6px;margin-bottom:12px">
          ${['minimo','medio','premium'].map((m,i)=>`<div style="flex:1;background:${S.calcMode===m?'linear-gradient(135deg,var(--primary),var(--accent))':'var(--surface3)'};border:1px solid ${S.calcMode===m?'var(--primary)':'var(--border)'};border-radius:var(--radius-xs);padding:7px;text-align:center;cursor:pointer;font-size:11px;color:${S.calcMode===m?'#fff':'var(--muted)'}" onclick="S.calcMode='${m}';render()">${['💰 Econômico','⚖️ Médio','💎 Premium'][i]}</div>`).join('')}
        </div>
        <div style="display:flex;gap:6px;margin-bottom:12px">
          <select class="sb" id="csel" style="margin:0;flex:1"><option value="">Selecionar serviço...</option>${S.services.map(s=>`<option value="${s.id}">[${s.cat}] ${s.nome} — R$${s[key]}</option>`).join('')}</select>
          <input type="number" id="cqty" value="1" min="1" style="width:60px;background:var(--surface3);border:1px solid var(--border);color:var(--text);border-radius:var(--radius-xs);padding:7px;font-size:12px;outline:none">
          <button class="btn" onclick="addCI()">+</button>
        </div>
        ${S.calcItems.length===0?'<div style="text-align:center;color:var(--muted);padding:16px;font-size:12px">Nenhum serviço adicionado</div>':''}
        ${S.calcItems.map((it,i)=>{ const s=S.services.find(x=>x.id===it.id); if(!s)return''; return `<div style="display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border)"><div style="flex:1;min-width:0"><div style="font-size:12px;font-weight:600">${s.nome}</div><div style="font-size:10px;color:var(--muted)">${s.cat} · x${it.qty}</div></div><div style="font-weight:700;color:var(--primary2)">R$${(s[key]*it.qty).toFixed(0)}</div><button onclick="S.calcItems.splice(${i},1);render()" style="background:transparent;border:none;color:var(--red);cursor:pointer">✕</button></div>`; }).join('')}
      </div></div>
      <div class="card"><div class="card-t">Ajustes</div><div style="padding:14px 16px">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
          ${[['Deslocamento','calcDesl',30],['Urgência','calcUrg',50],['Desconto','calcDesc',30],['Comissão','calcCom',20]].map(([lbl,k,max])=>`<div><div style="font-size:10px;color:var(--muted);text-transform:uppercase;margin-bottom:5px">${lbl}</div><div style="display:flex;align-items:center;gap:8px"><input type="range" min="0" max="${max}" step="1" value="${S[k]}" oninput="S.${k}=+this.value;render()" style="flex:1;accent-color:var(--primary)"><span style="font-size:11px;color:var(--primary2);min-width:30px;font-weight:700">${S[k]}%</span></div></div>`).join('')}
        </div>
      </div></div>
    </div>
    <div>
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px;position:relative;overflow:hidden">
        <div style="position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--primary),var(--accent))"></div>
        <div style="font-size:10px;color:var(--muted);text-transform:uppercase;margin-bottom:4px">Total do orçamento</div>
        <div style="font-family:'Syne',sans-serif;font-size:28px;font-weight:800;color:var(--primary2)">${R(total)}</div>
        <div style="margin-top:12px;border-top:1px solid var(--border);padding-top:12px">
          ${[['Subtotal',sub,'var(--muted)'],['+ Deslocamento',desl,'var(--muted)'],['+ Urgência',urg,'var(--muted)'],['- Desconto',-desc,'var(--yellow)'],['Custo estimado',custoT,'var(--red)'],['Comissão',com,'var(--muted)'],['💰 Lucro líquido',lucro,'var(--green)']].map(([l,v,c])=>`<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--border);font-size:11px"><span style="color:var(--muted)">${l}</span><span style="color:${c};font-weight:600">R$${Math.abs(v).toFixed(2)}</span></div>`).join('')}
          <div style="display:flex;justify-content:space-between;padding:6px 0;font-size:12px"><span style="font-weight:700">Margem</span><span style="color:${marg>25?'var(--green)':marg>15?'var(--yellow)':'var(--red)'};font-weight:700">${marg}%</span></div>
        </div>
      </div>
      <div class="card"><div class="card-t">💳 Simulação de pagamento</div><div style="padding:12px 16px;display:flex;flex-direction:column;gap:5px;font-size:11px">
        <div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--border)"><span style="color:var(--muted)">PIX (-3%)</span><span style="color:var(--green);font-weight:700">${R(total*0.97)}</span></div>
        <div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--border)"><span style="color:var(--muted)">Débito (${maq.debito}%)</span><span>${R(total*(1+maq.debito/100))}</span></div>
        ${[1,2,3,6,12].map(p=>`<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--border)"><span style="color:var(--muted)">${p}x crédito</span><span>${R(cm(p)/p)}/parc</span></div>`).join('')}
        <button class="btn ghost" style="width:100%;margin-top:8px;justify-content:center" onclick="S.calcItems=[];S.calcDesc=0;S.calcUrg=0;S.calcDesl=0;S.calcCom=0;render()">🔄 Limpar</button>
      </div></div>
    </div>
  </div>`;
}

function rOrc(){
  const q    = S.orcQ.toLowerCase();
  const f    = S.orc.filter(o=>!q||o.cliente.toLowerCase().includes(q)||o.tipo.toLowerCase().includes(q)||o.status.toLowerCase().includes(q));
  const aprov= S.orc.filter(o=>o.status==='Aprovado');

  // Cards mobile com swipe para revelar ações
  const mobileCards = f.length === 0
    ? `<div style="text-align:center;padding:24px;color:var(--muted);font-size:12px">Nenhum orçamento encontrado</div>`

  <div class="swipe-card-wrap" id="swwrap-${o.id}">

      <div class="swipe-card-row1">
        <div>
          <div class="swipe-card-name">${o.cliente}</div>

        </div>
        <span class="badge ${o.status==='Aprovado'?'gr':o.status==='Aguardando'?'am':'re'}">${o.status}</span>
      </div>
      <div class="swipe-card-row2">
        <span class="swipe-card-valor">R$${o.valor}</span>

  <div class="kpi-grid" style="grid-template-columns:repeat(4,1fr);margin-bottom:14px">

    <div class="kpi gr"><div class="kpi-l">Aprovados</div><div class="kpi-v">${aprov.length}</div></div>
    <div class="kpi am"><div class="kpi-l">Aguardando</div><div class="kpi-v">${S.orc.filter(o=>o.status==='Aguardando').length}</div></div>
    <div class="kpi re"><div class="kpi-l">Recusados</div><div class="kpi-v">${S.orc.filter(o=>o.status==='Recusado').length}</div></div>
  </div>

function rAgenda(){

  let cells = Array(prim).fill(null);
  for(let d=1;d<=total;d++) cells.push(d);
  while(cells.length%7) cells.push(null);
  const tc = {Serviço:'',Instalação:'',Orçamento:'am',Comercial:'gr',Pessoal:''};
  return `
  <div class="sh"><div class="sh-t">Agenda — Maio 2025</div><button class="btn" onclick="mNovoAg()">+ Compromisso</button></div>
  <div class="cal-hdr">${dias.map(d=>`<span>${d}</span>`).join('')}</div>
  <div class="cal-grid">${cells.map(d=>{
    if(!d) return `<div style="min-height:52px"></div>`;
    const evs = S.agenda.filter(a=>a.dia===d);
    return `<div class="cal-day ${evs.length?'has-ev':''} ${d===hoje?'today':''}"><div class="dn">${d}</div>${evs.map(e=>`<div class="cal-ev ${tc[e.tipo]||''}">${e.hora} ${e.titulo.split('-')[0].trim().slice(0,7)}</div>`).join('')}</div>`;

    <td style="font-weight:700;color:var(--primary2)">${a.dia}</td>
    <td style="color:var(--muted)">${a.hora}</td>
    <td style="font-weight:600">${a.titulo}</td>
    <td><span class="badge bl">${a.tipo}</span></td>
    <td><span class="badge ${a.status==='Confirmado'?'gr':'am'}">${a.status}</span></td>

      <button class="btn ghost sm" onclick="toggleAg(${a.id})">${a.status==='Confirmado'?'⏸':'✅'}</button>

function rFin(){
  if(!S.finTab) S.finTab = 'visao';
  const aprov      = S.orc.filter(o=>o.status==='Aprovado');
  const fatOrc     = aprov.reduce((a,o)=>a+o.valor,0);
  const lucroOrc   = aprov.reduce((a,o)=>a+o.lucro,0);
  const totalExtras= S.recExtras.reduce((a,r)=>a+r.valor,0);
  const totalGastos= S.gastos.reduce((a,g)=>a+g.valor,0);
  const totalBruto = fatOrc+totalExtras;
  const totalLiquido=totalBruto-totalGastos;

  const tabs = `<div class="stabs">
    ${['visao','receitas','gastos'].map(t=>`<button class="stab ${S.finTab===t?'active':''}" onclick="S.finTab='${t}';render()">${{visao:'📊 Visão geral',receitas:'💵 Receitas',gastos:'💸 Gastos'}[t]}</button>`).join('')}
  </div>`;

  const header = `
  <div class="sh"><div class="sh-t">Financeiro</div>
    <div style="display:flex;gap:6px">
      ${S.finTab==='receitas'?'<button class="btn" onclick="mNovaRecExtra()">+ Receita</button>':''}
      ${S.finTab==='gastos'?'<button class="btn danger" onclick="mNovoGasto()">+ Gasto</button>':''}
    </div>
  </div>`;

  if(S.finTab === 'visao'){
    const pct = Math.min(100,Math.round(fatOrc/(S.cfg.metaMensal||1)*100));
    return header + tabs + `
    <div class="kpi-grid">
      <div class="kpi bl"><div class="kpi-l">Faturamento (OS)</div><div class="kpi-v">${R(fatOrc)}</div></div>
      <div class="kpi tl"><div class="kpi-l">Receitas extras</div><div class="kpi-v">${R(totalExtras)}</div></div>
      <div class="kpi gr"><div class="kpi-l">Total bruto</div><div class="kpi-v">${R(totalBruto)}</div></div>
      <div class="kpi re"><div class="kpi-l">Total gastos</div><div class="kpi-v">${R(totalGastos)}</div></div>
      <div class="kpi gr"><div class="kpi-l">Resultado líquido</div><div class="kpi-v">${R(totalLiquido)}</div></div>

    </div>
    <div class="row2">
      <div class="card"><div class="card-t">📈 Resumo</div><div style="padding:12px 16px"><div class="mini-list">
        <div class="mi"><span>Margem bruta</span><span style="color:var(--green);font-weight:700">${fatOrc?Math.round(lucroOrc/fatOrc*100):0}%</span></div>
        <div class="mi"><span>Resultado líquido</span><span style="color:${totalLiquido>=0?'var(--green)':'var(--red)'};font-weight:700">${R(totalLiquido)}</span></div>
        <div class="mi"><span>Meta diária</span><span style="color:var(--yellow);font-weight:700">${R(S.cfg.metaMensal/22)}</span></div>
        <div class="mi"><span>Meta semanal</span><span style="color:var(--yellow);font-weight:700">${R(S.cfg.metaSemanal)}</span></div>

      <div class="card"><div class="card-t">📋 Últimos gastos</div><div style="padding:10px 16px"><div class="mini-list">

      </div></div></div>
    </div>`;

  if(S.finTab === 'receitas'){
    return header + tabs + `
    <div class="kpi-grid" style="grid-template-columns:repeat(3,1fr);margin-bottom:14px">

      <div class="kpi tl"><div class="kpi-l">Extras</div><div class="kpi-v">${R(totalExtras)}</div></div>

    </div>
    <div class="card"><div class="card-t">💵 Receitas extras</div>
      <div class="tw" style="border:none;margin:0"><table><thead><tr><th>Descrição</th><th style="width:14%">Categoria</th><th style="width:14%">Data</th><th style="width:14%">Valor</th><th style="width:8%">Ação</th></tr></thead>
      <tbody>${S.recExtras.length>0?[...S.recExtras].reverse().map(r=>`<tr>
        <td style="font-weight:600">${r.desc}</td>
        <td><span class="tag">${r.cat}</span></td>
        <td style="color:var(--muted);font-size:11px">${r.data}</td>
        <td style="color:var(--green);font-weight:700">${R(r.valor)}</td>
        <td><button class="btn danger sm" onclick="delRecExtra(${r.id})">🗑</button></td>
      </tr>`).join(''):'<tr><td colspan="5" style="text-align:center;color:var(--muted);padding:20px">Nenhuma receita extra</td></tr>'}
      </tbody></table></div>
    </div>`;
  }

  if(S.finTab === 'gastos'){
    const topCats = Object.entries(S.gastos.reduce((a,g)=>{ a[g.desc]=(a[g.desc]||0)+g.valor; return a; },{})).sort((a,b)=>b[1]-a[1]).slice(0,5);
    const maxGasto = topCats.length ? topCats[0][1] : 1;
    return header + tabs + `
    <div class="kpi-grid" style="grid-template-columns:repeat(3,1fr);margin-bottom:14px">
      <div class="kpi re"><div class="kpi-l">Total gastos</div><div class="kpi-v">${R(totalGastos)}</div></div>
      <div class="kpi am"><div class="kpi-l">Qtd lançamentos</div><div class="kpi-v">${S.gastos.length}</div></div>
      <div class="kpi gr"><div class="kpi-l">Resultado líquido</div><div class="kpi-v">${R(totalLiquido)}</div></div>
    </div>
    <div class="row2">
      <div class="card"><div class="card-t">📊 Distribuição</div><div style="padding:14px 16px"><div class="bar-chart">

          const pct=maxGasto>0?Math.round(val/maxGasto*100):0;
          return`<div class="bar-row"><div class="bar-lbl">${desc.length>12?desc.slice(0,12)+'…':desc}</div><div class="bar-track"><div class="bar-f" style="width:${pct}%;background:var(--red)"></div></div><div class="bar-val" style="color:var(--red)">${R(val)}</div></div>`;
        }).join(''):'<div style="color:var(--muted);text-align:center;padding:14px">Sem dados</div>'}
      </div></div></div>
      <div class="card"><div class="card-t">📋 Últimos</div><div style="padding:10px 16px"><div class="mini-list">
        ${[...S.gastos].reverse().slice(0,5).map(g=>`<div class="mi"><div><div style="font-weight:600">${g.desc}</div><div style="font-size:10px;color:var(--muted)">${g.data}</div></div><span style="color:var(--red);font-weight:700">${R(g.valor)}</span></div>`).join('')||'<div style="color:var(--muted);text-align:center;padding:12px">Nenhum gasto</div>'}
      </div></div></div>
    </div>
    <div class="card"><div class="card-t">🧾 Todos os gastos</div>
      <div class="tw" style="border:none;margin:0"><table><thead><tr><th>Descrição</th><th style="width:14%">Data</th><th style="width:14%">Valor</th><th style="width:14%">% total</th><th style="width:8%">Ação</th></tr></thead>
      <tbody>${S.gastos.length>0?[...S.gastos].reverse().map(g=>`<tr>
        <td style="font-weight:600">${g.desc}</td>
        <td style="color:var(--muted);font-size:11px">${g.data}</td>
        <td style="color:var(--red);font-weight:700">${R(g.valor)}</td>
        <td><div class="prog" style="margin:0"><div class="prog-f re" style="width:${totalGastos>0?Math.round(g.valor/totalGastos*100):0}%"></div></div><div style="font-size:10px;color:var(--muted);margin-top:2px">${totalGastos>0?Math.round(g.valor/totalGastos*100):0}%</div></td>
        <td><button class="btn danger sm" onclick="delGasto(${S.gastos.indexOf(g)})">🗑</button></td>
      </tr>`).join(''):'<tr><td colspan="5" style="text-align:center;color:var(--muted);padding:20px">Nenhum gasto registrado</td></tr>'}
      </tbody></table></div>
    </div>`;
  }
  return '';
}

function rNotas(){
  if(!S.notas) S.notas = [];
  const fixadas = S.notas.filter(n=>n.fixada);
  const normais = S.notas.filter(n=>!n.fixada);
  const todas   = [...fixadas,...normais];
  const corMap  = {bl:'var(--primary2)',gr:'var(--green)',am:'var(--yellow)',pu:'var(--accent)',tl:'var(--cyan)',pk:'var(--pink)',re:'var(--red)'};
  const corBg   = {bl:'rgba(124,77,255,.08)',gr:'rgba(34,215,135,.07)',am:'rgba(245,197,24,.07)',pu:'rgba(200,64,224,.08)',tl:'rgba(20,184,166,.07)',pk:'rgba(236,72,153,.07)',re:'rgba(255,78,106,.07)'};
  const corBd   = {bl:'rgba(124,77,255,.25)',gr:'rgba(34,215,135,.25)',am:'rgba(245,197,24,.25)',pu:'rgba(200,64,224,.25)',tl:'rgba(20,184,166,.25)',pk:'rgba(236,72,153,.25)',re:'rgba(255,78,106,.25)'};
  const totalChk= S.notas.reduce((a,n)=>a+(n.checklist?n.checklist.length:0),0);
  const totalOk = S.notas.reduce((a,n)=>a+(n.checklist?n.checklist.filter(c=>c.ok).length:0),0);
  return `
  <div class="sh"><div class="sh-t">Notas & Checklist <span class="tag">${S.notas.length}</span></div>
    <button class="btn" onclick="mNovaNota()">+ Nova Nota</button>
  </div>
  <div class="kpi-grid" style="grid-template-columns:repeat(4,1fr);margin-bottom:16px">
    <div class="kpi bl"><div class="kpi-l">Total de notas</div><div class="kpi-v">${S.notas.length}</div></div>
    <div class="kpi am"><div class="kpi-l">Fixadas</div><div class="kpi-v">${fixadas.length}</div></div>
    <div class="kpi gr"><div class="kpi-l">Tarefas ok</div><div class="kpi-v">${totalOk}<span style="font-size:12px;color:var(--muted)">/${totalChk}</span></div></div>
    <div class="kpi pu"><div class="kpi-l">Pendências</div><div class="kpi-v">${totalChk-totalOk}</div></div>
  </div>
  ${todas.length===0?`<div class="card" style="text-align:center;padding:40px;color:var(--muted)">
    <div style="font-size:40px;margin-bottom:12px">📝</div>
    <div style="font-size:14px;font-weight:600;color:var(--text);margin-bottom:6px">Nenhuma nota ainda</div>
    <div style="font-size:12px">Crie sua primeira nota para organizar lembretes, checklists e tarefas.</div>
  </div>`:''}
  <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px">
    ${todas.map(n=>{
      const cl  = n.cor||'bl';
      const chkTot = n.checklist?n.checklist.length:0;
      const chkOk  = n.checklist?n.checklist.filter(c=>c.ok).length:0;
      const pct    = chkTot>0?Math.round(chkOk/chkTot*100):0;
      return `<div style="background:${corBg[cl]};border:1px solid ${corBd[cl]};border-radius:var(--radius);padding:14px;display:flex;flex-direction:column;gap:8px">
        <div style="display:flex;align-items:flex-start;gap:6px;justify-content:space-between">
          <div style="font-weight:700;font-size:13px;color:${corMap[cl]};flex:1">${n.fixada?'📌 ':''} ${n.titulo}</div>
          <div style="display:flex;gap:3px;flex-shrink:0">
            <button class="btn ghost sm" onclick="toggleFixar(${n.id})" title="${n.fixada?'Desafixar':'Fixar'}">${n.fixada?'📌':'📍'}</button>
            <button class="btn ghost sm" onclick="mEditNota(${n.id})">✏️</button>
            <button class="btn danger sm" onclick="delNota(${n.id})">🗑</button>
          </div>
        </div>
        ${n.texto?`<div style="font-size:12px;color:var(--muted);line-height:1.5;white-space:pre-wrap">${n.texto}</div>`:''}
        ${chkTot>0?`<div>
          <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-bottom:4px"><span>Checklist</span><span>${chkOk}/${chkTot} — ${pct}%</span></div>
          <div class="prog" style="margin-bottom:8px"><div class="prog-f ${pct===100?'gr':pct>=50?'am':'re'}" style="width:${pct}%"></div></div>
          <div style="display:flex;flex-direction:column;gap:4px">
            ${n.checklist.map(c=>`<div style="display:flex;align-items:center;gap:7px;font-size:12px;cursor:pointer" onclick="toggleCheck(${n.id},${c.id})">
              <div style="width:15px;height:15px;border-radius:4px;border:1px solid ${c.ok?'var(--green)':'var(--border2)'};background:${c.ok?'rgba(34,215,135,.15)':'transparent'};display:flex;align-items:center;justify-content:center;flex-shrink:0">
                ${c.ok?`<span style="color:var(--green);font-size:10px">✓</span>`:''}
              </div>
              <span style="color:${c.ok?'var(--muted)':'var(--text)'};text-decoration:${c.ok?'line-through':''}">${c.texto}</span>
            </div>`).join('')}
          </div>
          <div style="display:flex;gap:6px;margin-top:8px">
            <input id="chk-new-${n.id}" class="sb" style="flex:1;font-size:11px;padding:5px 8px" placeholder="+ Nova tarefa..." onkeydown="if(event.key==='Enter')addCheckItem(${n.id})">
            <button class="btn sm" onclick="addCheckItem(${n.id})">+</button>
          </div>
        </div>`:`<div>
          <div style="font-size:10px;color:var(--muted);margin-bottom:6px">Nenhuma tarefa ainda</div>
          <div style="display:flex;gap:6px">
            <input id="chk-new-${n.id}" class="sb" style="flex:1;font-size:11px;padding:5px 8px" placeholder="+ Adicionar tarefa..." onkeydown="if(event.key==='Enter')addCheckItem(${n.id})">
            <button class="btn sm" onclick="addCheckItem(${n.id})">+</button>
          </div>
        </div>`}
        <div style="font-size:10px;color:var(--muted2);margin-top:2px">${n.data||''}</div>
      </div>`;
    }).join('')}
  </div>`;
}

function openM(html){ document.getElementById('mroot').innerHTML=`<div class="modal-ov" onclick="if(event.target.classList.contains('modal-ov'))closeM()"><div class="modal">${html}</div></div>`; }
function closeM(){ document.getElementById('mroot').innerHTML=''; }

// ── Categorias ──
function mGerirCats(){
  openM(`<div class="modal-t">🏷️ Gerenciar Categorias <button class="xbtn" onclick="closeM()">✕</button></div>
  <div style="margin-bottom:14px"><div style="font-size:12px;color:var(--muted);margin-bottom:10px">Clique ✕ para excluir uma categoria:</div>
  <div id="cat-list">${S.categorias.map((c,i)=>`<span class="cat-chip">${c}<button class="x" onclick="remCat(${i})">✕</button></span>`).join('')}</div></div>
  <div style="display:flex;gap:8px"><input class="sb" id="nova-cat" style="flex:1" placeholder="Nova categoria..."><button class="btn" onclick="addCat()">+ Adicionar</button></div>
  <div style="display:flex;gap:8px;margin-top:16px;justify-content:flex-end"><button class="btn" onclick="closeM();render();auto()">✅ Concluir</button></div>`);
}
function remCat(i){ S.categorias.splice(i,1); document.getElementById('cat-list').innerHTML=S.categorias.map((c,i)=>`<span class="cat-chip">${c}<button class="x" onclick="remCat(${i})">✕</button></span>`).join(''); }
function addCat(){ const v=document.getElementById('nova-cat').value.trim(); if(!v||S.categorias.includes(v))return; S.categorias.push(v); document.getElementById('nova-cat').value=''; document.getElementById('cat-list').innerHTML=S.categorias.map((c,i)=>`<span class="cat-chip">${c}<button class="x" onclick="remCat(${i})">✕</button></span>`).join(''); }

function salvarNovoServ(){
  const sv={
    id:Date.now(),nome:document.getElementById('sn').value||'Serviço',

  if(!S.os) S.os = [];

  const abertas   = S.os.filter(o=>!['Concluída','Entregue','Cancelada'].includes(o.status));
  const concluidas= S.os.filter(o=>['Concluída','Entregue'].includes(o.status));
  const canceladas= S.os.filter(o=>o.status==='Cancelada');
  const urgentes  = S.os.filter(o=>o.prioridade==='Urgente'&&!['Concluída','Entregue','Cancelada'].includes(o.status));

  const q = S.osQ.toLowerCase();
  let lista = S.osTab==='abertas' ? abertas
            : S.osTab==='concluidas' ? concluidas
            : S.osTab==='todas' ? S.os
            : canceladas;
  if(q) lista = lista.filter(o=>
    o.id.toLowerCase().includes(q)||
    o.cliente.toLowerCase().includes(q)||
    o.tipo.toLowerCase().includes(q)||
    o.status.toLowerCase().includes(q)||
    (o.equipamento||'').toLowerCase().includes(q)
  );

  // Link público de abertura de chamado
  const publicUrl = window.location.href.replace(/[?#].*/, '').replace('index.html','') + 'chamado.html';

  return `
  <div class="sh">
    <div class="sh-t">Ordens de Serviço</div>
    <div style="display:flex;gap:6px;flex-wrap:wrap">
      <button class="btn ghost sm" onclick="copiarLinkChamado()" title="Copiar link do formulário do cliente">🔗 Link do Cliente</button>
      <button class="btn sm" onclick="mNovaOS()">+ Nova OS</button>
    </div>
  </div>

  ${urgentes.length>0?`<div class="alert danger" style="margin-bottom:12px">🚨 <strong>${urgentes.length} OS urgente(s)</strong> em aberto: ${urgentes.map(o=>`<button class="btn danger sm" onclick="mVerOS('${o.id}')" style="margin-left:4px">${o.id}</button>`).join('')}</div>`:''}

  <div class="kpi-grid" style="grid-template-columns:repeat(5,1fr);margin-bottom:14px">
    <div class="kpi am"><div class="kpi-l">Abertas</div><div class="kpi-v">${S.os.filter(o=>o.status==='Aberta').length}</div></div>
    <div class="kpi pu"><div class="kpi-l">Em Execução</div><div class="kpi-v">${S.os.filter(o=>o.status==='Em Execução').length}</div></div>
    <div class="kpi bl"><div class="kpi-l">Diagnóstico</div><div class="kpi-v">${S.os.filter(o=>o.status==='Diagnóstico').length}</div></div>
    <div class="kpi gr"><div class="kpi-l">Concluídas</div><div class="kpi-v">${concluidas.length}</div></div>
    <div class="kpi re"><div class="kpi-l">Urgentes</div><div class="kpi-v">${urgentes.length}</div></div>
  </div>

  <div class="stabs">
    <button class="stab ${S.osTab==='abertas'?'active':''}" onclick="S.osTab='abertas';render()">🔓 Abertas (${abertas.length})</button>
    <button class="stab ${S.osTab==='concluidas'?'active':''}" onclick="S.osTab='concluidas';render()">✅ Concluídas (${concluidas.length})</button>
    <button class="stab ${S.osTab==='todas'?'active':''}" onclick="S.osTab='todas';render()">📋 Todas (${S.os.length})</button>
    <button class="stab ${S.osTab==='canceladas'?'active':''}" onclick="S.osTab='canceladas';render()">❌ Canceladas (${canceladas.length})</button>
  </div>

  <input id="os-search" class="sb" style="margin-bottom:12px" placeholder="🔍 Buscar por ID, cliente, equipamento, tipo ou status..." value="${S.osQ}">

  ${lista.length === 0 ? `
  <div class="card" style="text-align:center;padding:48px 20px">
    <div style="font-size:40px;margin-bottom:12px">🛠️</div>
    <div style="font-size:15px;font-weight:600;margin-bottom:6px;font-family:'Syne',sans-serif">Nenhuma OS encontrada</div>
    <div style="font-size:12px;color:var(--muted);margin-bottom:20px">
      ${S.osTab==='abertas'?'Crie uma nova OS ou compartilhe o link com seu cliente para ele abrir um chamado.':'Sem registros nesta categoria.'}
    </div>
    ${S.osTab==='abertas'?`
    <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap">
      <button class="btn ghost" onclick="copiarLinkChamado()">🔗 Copiar link do cliente</button>
      <button class="btn" onclick="mNovaOS()">+ Criar OS manualmente</button>
    </div>`:''}
  </div>` : `
  <div style="display:flex;flex-direction:column;gap:8px">
    ${lista.map(os=>osCard(os)).join('')}
  </div>`}`;
}

function osCard(os){
  const hoje    = new Date();
  const criada  = new Date(os.criadaEm||os.data);
  const diasAberta = Math.floor((hoje-criada)/(864e5));
  const cliMatch = S.clientes.find(c=>c.email&&os.emailCliente&&c.email.toLowerCase()===os.emailCliente.toLowerCase());
  const isNova  = os.origem==='cliente' && os.status==='Aberta';

  return `
  <div class="card" style="cursor:default;border-color:${isNova?'rgba(245,197,24,.4)':'var(--border)'};transition:border-color .2s">
    <div class="os-card-main" style="padding:14px 18px;display:flex;align-items:flex-start;gap:14px;flex-wrap:wrap">

      <!-- ID + status dot -->
      <div style="flex-shrink:0;min-width:80px">
        <div style="font-family:'Syne',sans-serif;font-weight:800;font-size:13px;color:var(--primary2)">${os.id}</div>
        <div style="display:flex;align-items:center;gap:5px;margin-top:4px">
          <div style="width:7px;height:7px;border-radius:50%;background:${osStatusDot(os.status)};flex-shrink:0"></div>
          <span class="badge ${osStatusColor(os.status)}" style="font-size:9px">${os.status}</span>
        </div>
        ${os.prioridade&&os.prioridade!=='Normal'?`<span class="badge ${prioColor(os.prioridade)}" style="font-size:9px;margin-top:4px;display:inline-flex">⚡ ${os.prioridade}</span>`:''}
        ${isNova?`<div style="font-size:9px;color:var(--yellow);margin-top:3px;font-weight:600">🆕 Novo chamado</div>`:''}
      </div>

      <!-- Dados principais -->
      <div style="flex:1;min-width:200px">
        <div style="font-weight:700;font-size:13px;margin-bottom:2px">${os.cliente}</div>
        <div style="font-size:11px;color:var(--muted);margin-bottom:4px">${os.tipo}${os.equipamento?' · '+os.equipamento:''}</div>
        <div style="font-size:11px;color:var(--muted);line-height:1.5;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical">${os.problema||'Sem descrição'}</div>
        ${cliMatch?`<div style="font-size:10px;color:var(--green);margin-top:4px">✓ Cliente cadastrado · ${cliMatch.servicos} serviço(s) anteriores</div>`:''}
      </div>

      <!-- Meta dados -->
      <div style="flex-shrink:0;text-align:right;min-width:90px">
        <div style="font-size:10px;color:var(--muted)">Criada ${os.criadaEm?new Date(os.criadaEm).toLocaleDateString('pt-BR'):os.data}</div>
        <div style="font-size:10px;color:${diasAberta>7&&!['Concluída','Entregue','Cancelada'].includes(os.status)?'var(--red)':'var(--muted)'};margin-top:2px">${diasAberta}d aberta</div>
        ${os.valor?`<div style="font-weight:700;color:var(--green);font-size:13px;margin-top:4px">R$${os.valor}</div>`:''}
        <span class="tag" style="margin-top:4px">${os.tipo}</span>
      </div>

      <!-- Ações -->
      <div class="os-card-actions" style="flex-shrink:0;display:flex;flex-direction:column;gap:5px;min-width:80px">
        <button class="btn sm" onclick="mVerOS('${os.id}')" style="justify-content:center">👁 Ver</button>
        <button class="btn ghost sm" onclick="mEditOS('${os.id}')" style="justify-content:center">✏️ Editar</button>
        <button class="btn ghost sm" onclick="avancarStatusOS('${os.id}')" style="justify-content:center;${['Concluída','Entregue','Cancelada'].includes(os.status)?'opacity:.4;pointer-events:none':''}">⏭ Avançar</button>
      </div>
    </div>

    <!-- Barra de progresso de status -->
    <div style="padding:0 18px 12px;display:flex;gap:3px">
      ${['Aberta','Diagnóstico','Em Execução','Aguardando Peça','Concluída','Entregue'].map((st,i)=>{
        const idx = OS_STATUS.indexOf(os.status);
        const done = OS_STATUS.indexOf(st) <= idx && os.status!=='Cancelada';
        return `<div style="flex:1;height:3px;border-radius:2px;background:${done?osStatusDot(st):'var(--surface3)'}" title="${st}"></div>`;
      }).join('')}
    </div>
    ${os.historico&&os.historico.length?`
    <div style="padding:0 18px 10px">
      <div style="font-size:10px;color:var(--muted);border-top:1px solid var(--border);padding-top:8px">
        Última atualização: <strong style="color:var(--text)">${os.historico[os.historico.length-1].texto}</strong>
        <span style="color:var(--muted2)"> · ${os.historico[os.historico.length-1].data}</span>
      </div>
    </div>`:''}
  </div>`;
}

// ── Avança status automaticamente ──
function avancarStatusOS(id){
  const os = S.os.find(x=>x.id===id); if(!os)return;
  const idx = OS_STATUS.indexOf(os.status);
  if(idx < 0 || idx >= OS_STATUS.indexOf('Entregue')) return;
  const proximo = OS_STATUS[idx+1];
  os.status = proximo;
  if(!os.historico) os.historico=[];
  os.historico.push({data:new Date().toLocaleDateString('pt-BR'),texto:`Status avançado para "${proximo}"`});
  render(); auto();
}

      <div style="font-size:10px;color:var(--muted);text-transform:uppercase;margin-bottom:8px">Cliente</div>

  <div class="odr"><div class="odr-l">Problema</div><div class="odr-v">${os.problema||'—'}</div></div>

function mudarStatusOS(id, novoStatus){
  const os = S.os.find(x=>x.id===id); if(!os)return;
  os.status = novoStatus;
  if(!os.historico) os.historico=[];
  os.historico.push({data:new Date().toLocaleDateString('pt-BR'),texto:`Status alterado para "${novoStatus}"`});
  closeM(); render(); auto();
}

function delOS(id){
  if(!confirm('Excluir esta OS?')) return;
  const os = S.os.find(x=>x.id===id);
  // Se a OS veio de chamado de cliente, registra o ID como rejeitado
  // e remove o nó do Firebase para não reimportar
  if(os && os.origem === 'cliente'){
    if(!S.chamadosRejeitados) S.chamadosRejeitados = [];
    if(!S.chamadosRejeitados.includes(id)) S.chamadosRejeitados.push(id);
    // Apaga o chamado do Firebase (previne reimportação mesmo sem S.chamadosRejeitados)
    if(_firebase && db){
      _firebase.remove(_firebase.ref(db, 'gbr/chamados/' + id)).catch(()=>{});
    }
  }
  S.os = S.os.filter(x=>x.id!==id);
  closeM(); render(); auto();
}

function cadastrarClienteOS(osId){
  const os = S.os.find(x=>x.id===osId); if(!os)return;
  S.clientes.push({
    id:S.nextCli++, nome:os.cliente, tel:os.tel||'—',
    email:os.emailCliente||'', end:os.endereco||'—',
    tipo:'Novo', origem:'Chamado Online', servicos:0, gasto:0,
    nps:0, depoimento:'', followupData:'', followupStatus:'Pendente',
    equipamentos:os.equipamento?[{nome:os.equipamento,modelo:os.modelo||'',obs:''}]:[],
    contratos:[], historico:[], obs:'Cliente cadastrado via OS '+osId
  });
  closeM(); render(); auto();
  alert('✅ Cliente cadastrado no CRM!');
}

      <div class="fl" style="grid-column:1/-1"><label>Observações internas</label><input id="os-obs" placeholder="Notas internas, não visíveis ao cliente"></div>
    </div>
  </div>
  <div style="display:flex;gap:8px;margin-top:16px;justify-content:flex-end">

function salvarNovaOS(){
  const cli = document.getElementById('os-cli').value.trim();
  const prob= document.getElementById('os-prob').value.trim();
  if(!cli || !prob){ alert('Preencha o nome do cliente e a descrição do problema.'); return; }

  const id = 'OS-' + String(S.nextOS++).padStart(4,'0');
  const hoje = new Date().toLocaleDateString('pt-BR');

  S.os.push({
    id, cliente:cli,
    tel:document.getElementById('os-tel').value,
    emailCliente:document.getElementById('os-email').value,
    endereco:document.getElementById('os-end').value,
    equipamento:document.getElementById('os-equip').value,
    marca:'', modelo:document.getElementById('os-modelo').value,
    tipo:document.getElementById('os-tipo').value,
    prioridade:document.getElementById('os-prio').value,
    problema:prob,
    diagnostico:document.getElementById('os-diag').value,
    solucao:'', pecas:'',
    status:document.getElementById('os-status').value,
    valor:+document.getElementById('os-valor').value||0,

// Faz upload de fotos técnicas (pelo técnico no painel) e adiciona à OS
async function previewFotosOS(input, osId){
  const status = document.getElementById('eos-foto-status');
  if(!storage || !_firebase){ if(status) status.textContent = '⚠️ Storage não disponível.'; return; }
  const files = Array.from(input.files).slice(0,10);
  if(!files.length) return;
  if(status) status.textContent = `Enviando 0/${files.length}...`;
  const os = S.os.find(x=>x.id===osId); if(!os) return;
  if(!Array.isArray(os.fotos)) os.fotos = [];
  for(let i=0; i<files.length; i++){
    try {
      const file = files[i];
      const ext  = file.name.split('.').pop()||'jpg';
      const path = `chamados/${osId}/tecnico_${Date.now()}_${i}.${ext}`;
      const snap = await _firebase.uploadBytes(_firebase.sRef(storage, path), file);
      const url  = await _firebase.getDownloadURL(snap.ref);
      os.fotos.push(url);
      if(status) status.textContent = `Enviando ${i+1}/${files.length}...`;
    } catch(e){ console.error('Erro foto:', e); }
  }
  if(status) status.textContent = `✅ ${files.length} foto(s) adicionada(s). Salve para confirmar.`;
  auto(); // salva no Firebase
  // Recarrega a modal para mostrar as novas fotos
  closeM(); mEditOS(osId);
}

// Remove uma foto da OS por índice (não deleta do Storage — mantém histórico)
function removerFotoOS(osId, idx){
  const os = S.os.find(x=>x.id===osId); if(!os||!os.fotos) return;
  os.fotos.splice(idx, 1);
  auto(); closeM(); mEditOS(osId);
}

// ── Listener Firebase para novos chamados dos clientes ───────
// Fica escutando 'gbr/chamados' em tempo real
let _chamadosListener = null;
function iniciarListenerChamados(){
  if(!_firebase || !db || _chamadosListener) return;
  const chamadosRef = _firebase.ref(db, 'gbr/chamados');
  _chamadosListener = _firebase.onValue(chamadosRef, snap => {
    if(!snap.exists()) return;
    const data = snap.val();
    let novos = 0;
    // S.chamadosRejeitados: IDs de chamados que foram excluídos e não devem ser reimportados
    if(!S.chamadosRejeitados) S.chamadosRejeitados = [];
    Object.entries(data).forEach(([key, chamado]) => {
      if(!chamado || chamado._processado) return;
      const osId = chamado.osId || key;
      // Ignora chamados cujas OSs foram explicitamente excluídas
      if(S.chamadosRejeitados.includes(osId)) return;
      // Verifica se OS já existe
      if(S.os.find(o=>o.id===osId)) return;
      // Cria OS a partir do chamado
      const id = osId;
      S.os.push({
        id,
        cliente:    chamado.nome||'Desconhecido',
        tel:        chamado.tel||'',
        emailCliente:chamado.email||'',
        endereco:   chamado.endereco||'',
        equipamento:chamado.equipamento||'',
        marca:      '', modelo: chamado.modelo||'',
        tipo:       chamado.tipo||'Manutenção',
        prioridade: chamado.urgente?'Urgente':'Normal',
        problema:   chamado.problema||'',
        diagnostico:'', solucao:'', pecas:'',
        status:     'Aberta',
        valor:      0,
        data:       new Date().toISOString().slice(0,10),
        prazo:      '',
        obs:        'Chamado aberto pelo cliente via formulário online.',
        origem:     'cliente',
        criadaEm:   chamado.criadaEm||new Date().toISOString(),
        fotos:      Array.isArray(chamado.fotos) ? chamado.fotos : [],
        historico:[{data:new Date().toLocaleDateString('pt-BR'),texto:'OS criada automaticamente via formulário do cliente'}]
      });
      // Marca o chamado como processado no Firebase para não reimportar
      _firebase.set(_firebase.ref(db, 'gbr/chamados/' + key + '/_processado'), true).catch(()=>{});
      novos++;
    });
    if(novos>0){
      setSS('ok', `🔔 ${novos} novo(s) chamado(s) recebido(s)!`);
      window.fbSave();
      if(S.page==='os') render();
    }
  });
}

// Carrega jsPDF + AutoTable uma única vez
let _jspdfLoaded = false;
async function loadJsPDF(){
  if(_jspdfLoaded) return;
  await new Promise((res, rej) => {
    const s1 = document.createElement('script');
    s1.src = 'https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
    s1.onload = () => {
      const s2 = document.createElement('script');
      s2.src = 'https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js';
      s2.onload = () => { _jspdfLoaded = true; res(); };
      s2.onerror = rej;
      document.head.appendChild(s2);
    };
    s1.onerror = rej;
    document.head.appendChild(s1);
  });
}
