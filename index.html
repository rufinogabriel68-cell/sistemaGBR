<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, set, onValue } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';
const firebaseConfig = {
  apiKey:"AIzaSyCUc8zBg-ci8BwAUJB5pbqnRhzqhQIH26E",
  authDomain:"gbrsistema.firebaseapp.com",
  projectId:"gbrsistema",
  storageBucket:"gbrsistema.appspot.com",
  messagingSenderId:"1045038353569",
  appId:"1:1045038353569:web:bfee704688da2a20c2f4e0",
  databaseURL:"https://gbrsistema-default-rtdb.firebaseio.com"
};
let db,dbRef,saveTO,primeiro=true;
function initFB(){
  try{
    db=getDatabase(initializeApp(firebaseConfig));
    dbRef=ref(db,'gbr/dados');
    setSS('loading','🔄 Conectando...');
    onValue(dbRef,snap=>{
      if(snap.exists()){
        if(!window._sv){mergeData(snap.val());safeRender();}
        setSS('ok','🟢 Sincronizado — '+new Date().toLocaleTimeString('pt-BR'));
        if(primeiro){primeiro=false;}
      }else{primeiro=false;window.fbSave();}
    },err=>setSS('err','❌ '+err.message));
  }catch(e){setSS('err','❌ Firebase: '+e.message);}
}
window.fbSave=async function(){
  window._sv=true;setSS('loading','💾 Salvando...');
  try{await set(dbRef,buildPayload());lSave();setSS('ok','🟢 Salvo — '+new Date().toLocaleTimeString('pt-BR'));}
  catch(e){lSave();setSS('err','❌ '+e.message);}
  setTimeout(()=>{window._sv=false;},800);
};
window.scheduleSave=function(){clearTimeout(saveTO);saveTO=setTimeout(()=>window.fbSave(),1500);};
initFB();
</script>

  if(document.getElementById('lpass').value===SENHA){

  }else{
    document.getElementById('lerr').textContent='Senha incorreta.';

    setTimeout(()=>document.getElementById('lerr').textContent='',3000);
  }
}

function buildPayload(){
  return{services:S.services,orc:S.orc,clientes:S.clientes,leads:S.leads,garantias:S.garantias,
    estoque:S.estoque,movEstoque:S.movEstoque,agenda:S.agenda,gastos:S.gastos,
    cfg:S.cfg,categorias:S.categorias,
    nextOrc:S.nextOrc,nextEst:S.nextEst,nextCli:S.nextCli,nextAg:S.nextAg,nextLead:S.nextLead,nextGar:S.nextGar,
    updatedAt:new Date().toISOString()};
}
function mergeData(d){
  ['services','orc','clientes','leads','garantias','estoque','movEstoque','agenda','gastos','categorias'].forEach(k=>{if(d[k])S[k]=d[k];});
  if(d.cfg)Object.assign(S.cfg,d.cfg);
  ['nextOrc','nextEst','nextCli','nextAg','nextLead','nextGar'].forEach(k=>{if(d[k])S[k]=d[k];});
}
function lSave(){try{localStorage.setItem('gbr_data',JSON.stringify(buildPayload()));}catch(e){}}
function lLoad(){try{const r=localStorage.getItem('gbr_data');if(r){mergeData(JSON.parse(r));return true;}}catch(e){}return false;}
function exportJSON(){const b=new Blob([JSON.stringify(buildPayload(),null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='gbr-backup-'+new Date().toISOString().slice(0,10)+'.json';a.click();}
function handleImport(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{mergeData(JSON.parse(ev.target.result));render();lSave();}catch(x){alert('Arquivo inválido');}};r.readAsText(f);e.target.value='';}
function auto(){window.scheduleSave&&window.scheduleSave();}
lLoad();

// ═══════════════════════════════════════════
//  NAVEGAÇÃO — busca com foco preservado
// ═══════════════════════════════════════════
function pg(p){
  S.page=p;
  const map={dash:'📊',servicos:'🔧',calc:'🧮',orc:'📋',crm:'👥',estoque:'📦',agenda:'📅',fin:'💰',config:'⚙️'};
  document.querySelectorAll('.nb').forEach(b=>b.classList.toggle('active',b.textContent.trim().startsWith(map[p]||'__')));
  render();
}

// RENDER SEM RECRIAR INPUT FOCADO
function safeRender(){
  const active=document.activeElement;
  const wasId=active&&active.id?active.id:null;
  const wasSel=(active&&active.tagName==='INPUT')?active.selectionStart:null;
  render();
  if(wasId){const el=document.getElementById(wasId);if(el){el.focus();if(wasSel!==null)try{el.setSelectionRange(wasSel,wasSel);}catch(e){}}}
}

// updateSearch: atualiza filtro e regera apenas a tbody/lista sem perder foco
function updateSearch(field,val){
  S[field]=val;
  // ao invés de render() completo, recria só a parte filtrada via innerHTML parcial
  renderFiltered();
}
function renderFiltered(){
  // re-render completo mas preservando foco
  safeRender();
}

function render(){
  const el=document.getElementById('root');if(!el)return;
  const pages={dash:rDash,servicos:rServicos,calc:rCalc,orc:rOrc,crm:rCRM,estoque:rEstoque,agenda:rAgenda,fin:rFin,config:rConfig};
  el.innerHTML=(pages[S.page]||rDash)();
  // re-vincular eventos dos inputs de busca APÓS render para não perder foco
  bindSearchInputs();
}

function bindSearchInputs(){
  // Vincula com addEventListener para não recriar o nó
  const binds=[
    ['srv-search','srvQ'],['orc-search','orcQ'],['cli-search','cliQ'],
    ['est-search','estQ'],['lead-search','leadQ'],
  ];
  binds.forEach(([id,field])=>{
    const el=document.getElementById(id);
    if(!el)return;
    // Remove listener antigo clonando
    el.oninput=function(){S[field]=this.value;renderFiltered();};
  });
}

function R(n){return 'R$ '+Number(n).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});}
function dR(dataServico,dias){return Math.ceil((new Date(dataServico).setDate(new Date(dataServico).getDate()+dias)-Date.now())/(864e5));}
function stars(n,max=5){return Array.from({length:max},(_,i)=>`<span class="star${i<n?'':' off'}">★</span>`).join('');}
function tipoBadge(t){const m={VIP:'pu',Recorrente:'bl',Novo:'tl',Inadimplente:'re'};return m[t]||'tl';}
function leadBadge(s){const m={'Primeiro contato':'bl','Negociando':'am','Proposta enviada':'pu','Fechado — Ganho':'gr','Fechado — Perdido':'re'};return m[s]||'bl';}
function avatar(nome){return nome.split(' ').map(n=>n[0]).slice(0,2).join('');}

// ═══════════════════════════════════════════
function rCalc(){
  const mk={minimo:'minVal',medio:'medVal',premium:'maxVal'};
  const key=mk[S.calcMode];
  const sub=S.calcItems.reduce((a,i)=>{const s=S.services.find(x=>x.id===i.id);return a+(s?s[key]*i.qty:0);},0);
  const desl=sub*S.calcDesl/100,urg=sub*S.calcUrg/100,desc=sub*S.calcDesc/100,com=sub*S.calcCom/100;
  const custoT=S.calcItems.reduce((a,i)=>{const s=S.services.find(x=>x.id===i.id);return a+(s?(s.material+s.mdo)*i.qty:0);},0);
  const total=sub+desl+urg-desc,lucro=total-custoT-com;
  const marg=total>0?Math.round(lucro/total*100):0;
  const maq=S.cfg.maquininha;
  const cm=p=>{const t=p===1?maq.credito1:maq['credito'+p]||0;return total*(1+t/100);};
  return `<div class="sh"><div class="sh-t">🧮 Calculadora</div><button class="btn" onclick="mSalvarOrc(${total.toFixed(2)},${lucro.toFixed(2)})">💾 Salvar Orçamento</button></div>
  <div style="display:grid;grid-template-columns:1fr 350px;gap:14px;min-width:0">
    <div>
      <div class="card" style="margin-bottom:10px">
        <div style="display:flex;gap:6px;margin-bottom:12px">${['minimo','medio','premium'].map((m,i)=>`<div style="flex:1;background:${S.calcMode===m?'var(--bl2)':'var(--bg4)'};border:1px solid ${S.calcMode===m?'var(--bl)':'var(--bd)'};border-radius:6px;padding:6px;text-align:center;cursor:pointer;font-size:11px;color:${S.calcMode===m?'#fff':'var(--tx2)'}" onclick="S.calcMode='${m}';render()">${['💰 Econômico','⚖️ Médio','💎 Premium'][i]}</div>`).join('')}</div>
        <div style="display:flex;gap:6px;margin-bottom:10px">
          <select class="sb" id="csel" style="margin:0;flex:1"><option value="">Selecionar serviço...</option>${S.services.map(s=>`<option value="${s.id}">[${s.cat}] ${s.nome} — R$${s[key]}</option>`).join('')}</select>
          <input type="number" id="cqty" value="1" min="1" style="width:65px;background:var(--bg4);border:1px solid var(--bd2);color:var(--tx);border-radius:6px;padding:6px 8px;font-size:12px;outline:none">
          <button class="btn" onclick="addCI()">+</button>
        </div>
        ${S.calcItems.length===0?'<div style="text-align:center;color:var(--tx3);padding:14px;font-size:12px">Nenhum serviço adicionado</div>':''}
        ${S.calcItems.map((it,i)=>{const s=S.services.find(x=>x.id===it.id);if(!s)return'';return`<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--bd)"><div style="flex:1;min-width:0"><div style="font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${s.nome}</div><div style="font-size:10px;color:var(--tx3)">${s.cat} · x${it.qty}</div></div><div style="font-weight:700;color:var(--bl3);flex-shrink:0">R$${(s[key]*it.qty).toFixed(0)}</div><button onclick="S.calcItems.splice(${i},1);render()" style="background:transparent;border:none;color:var(--rd);cursor:pointer;flex-shrink:0">✕</button></div>`;}).join('')}
      </div>
      <div class="card"><div class="card-t">Ajustes</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
          ${[['Deslocamento','calcDesl',30],['Urgência','calcUrg',50],['Desconto','calcDesc',30],['Comissão','calcCom',20]].map(([lbl,k,max])=>`<div><div style="font-size:10px;color:var(--tx3);text-transform:uppercase;margin-bottom:4px">${lbl}</div><div style="display:flex;align-items:center;gap:7px"><input type="range" min="0" max="${max}" step="1" value="${S[k]}" oninput="S.${k}=+this.value;render()" style="flex:1;accent-color:var(--bl)"><span style="font-size:11px;color:var(--bl3);min-width:30px;text-align:right;font-weight:600">${S[k]}%</span></div></div>`).join('')}
        </div>
      </div>
    </div>
    <div>
      <div style="background:var(--bg2);border:1px solid var(--bl2);border-radius:var(--r);padding:14px;margin-bottom:10px">
        <div style="font-size:10px;color:var(--tx3);text-transform:uppercase;margin-bottom:3px">Total do orçamento</div>
        <div style="font-size:26px;font-weight:700;color:var(--bl3)">${R(total)}</div>
        <div style="margin-top:10px;border-top:1px solid var(--bd);padding-top:10px">
          ${[['Subtotal',sub,'var(--tx2)'],['+ Deslocamento',desl,'var(--tx2)'],['+ Urgência',urg,'var(--tx2)'],['- Desconto',-desc,'var(--am)'],['Custo estimado',custoT,'var(--rd)'],['Comissão',com,'var(--tx2)'],['💰 Lucro',lucro,'var(--gr)']].map(([l,v,c])=>`<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--bd);font-size:11px"><span style="color:var(--tx2)">${l}</span><span style="color:${c};font-weight:600">R$${Math.abs(v).toFixed(2)}</span></div>`).join('')}
          <div style="display:flex;justify-content:space-between;padding:5px 0;font-size:12px"><span style="font-weight:700">Margem</span><span style="color:${marg>25?'var(--gr)':marg>15?'var(--am)':'var(--rd)'};font-weight:700">${marg}%</span></div>
        </div>
      </div>
      <div class="card"><div class="card-t">💳 Simulação de pagamento</div>
        <div style="display:flex;flex-direction:column;gap:5px;font-size:11px">
          <div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--bd)"><span style="color:var(--tx2)">💸 PIX (-3%)</span><span style="color:var(--gr);font-weight:700">${R(total*0.97)}</span></div>
          <div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--bd)"><span style="color:var(--tx2)">Débito (${maq.debito}%)</span><span>${R(total*(1+maq.debito/100))}</span></div>
          ${[1,2,3,6,12].map(p=>`<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--bd)"><span style="color:var(--tx2)">${p}x crédito</span><span>${R(cm(p)/p)}/parc</span></div>`).join('')}
        </div>
        <button class="btn ghost" style="width:100%;margin-top:10px;justify-content:center" onclick="S.calcItems=[];S.calcDesc=0;S.calcUrg=0;S.calcDesl=0;S.calcCom=0;render()">🔄 Limpar</button>
      </div>
    </div>
  </div>`;
}

function rAgenda(){
  const dias=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
  const hoje=11,total=31,prim=4;
  let cells=Array(prim).fill(null);for(let d=1;d<=total;d++)cells.push(d);while(cells.length%7)cells.push(null);
  const tc={Serviço:'',Instalação:'',Orçamento:'am',Comercial:'gr',Pessoal:''};
  return `<div class="sh"><div class="sh-t">📅 Agenda — Maio 2025</div><button class="btn" onclick="mNovoAg()">+ Compromisso</button></div>
  <div class="cal-hdr">${dias.map(d=>`<span>${d}</span>`).join('')}</div>
  <div class="cal-grid">${cells.map(d=>{if(!d)return`<div style="min-height:50px"></div>`;const evs=S.agenda.filter(a=>a.dia===d);return`<div class="cal-day ${evs.length?'has-ev':''} ${d===hoje?'today':''}"><div class="dn">${d}</div>${evs.map(e=>`<div class="cal-ev ${tc[e.tipo]||''}">${e.hora} ${e.titulo.split('-')[0].trim().slice(0,7)}</div>`).join('')}</div>`;}).join('')}</div>
  <div style="margin-top:14px"><div class="sh-t" style="margin-bottom:10px;font-size:13px">Todos os compromissos</div>
  <div class="tw"><table><thead><tr><th style="width:7%">Dia</th><th style="width:8%">Hora</th><th style="width:28%">Título</th><th style="width:11%">Tipo</th><th style="width:11%">Status</th><th style="width:22%">Obs</th><th style="width:13%">Ações</th></tr></thead>
  <tbody>${[...S.agenda].sort((a,b)=>a.dia-b.dia).map(a=>`<tr><td style="font-weight:700;color:var(--bl3)">${a.dia}</td><td style="color:var(--tx2)">${a.hora}</td><td style="font-weight:600">${a.titulo}</td><td><span class="badge bl">${a.tipo}</span></td><td><span class="badge ${a.status==='Confirmado'?'gr':'am'}">${a.status}</span></td><td style="font-size:11px;color:var(--tx2)">${a.obs}</td><td><div style="display:flex;gap:3px"><button class="btn ghost sm" onclick="toggleAg(${a.id})">${a.status==='Confirmado'?'⏸':'✅'}</button><button class="btn danger sm" onclick="delAg(${a.id})">🗑</button></div></td></tr>`).join('')}</tbody></table></div></div>`;
}

function rFin(){
  const aprov=S.orc.filter(o=>o.status==='Aprovado');
  const fat=aprov.reduce((a,o)=>a+o.valor,0),lucro=aprov.reduce((a,o)=>a+o.lucro,0);
  const gasto=S.gastos.reduce((a,g)=>a+g.valor,0),saldo=lucro-gasto;
  return `<div class="sh"><div class="sh-t">💰 Financeiro</div><button class="btn" onclick="mNovoGasto()">+ Gasto</button></div>
  <div class="kpi-grid"><div class="kpi bl"><div class="kpi-l">Faturamento</div><div class="kpi-v">${R(fat)}</div></div><div class="kpi gr"><div class="kpi-l">Lucro bruto</div><div class="kpi-v">${R(lucro)}</div></div><div class="kpi re"><div class="kpi-l">Gastos</div><div class="kpi-v">${R(gasto)}</div></div><div class="kpi ${saldo>0?'gr':'re'}"><div class="kpi-l">Saldo</div><div class="kpi-v">${R(saldo)}</div></div></div>
  <div class="row2">
    <div class="card"><div class="card-t">🎯 Metas</div>${[['Meta mensal',fat,S.cfg.metaMensal],['Meta semanal',fat/4,S.cfg.metaSemanal],['Meta anual',fat,S.cfg.metaAnual]].map(([lbl,val,meta])=>{const p=Math.min(100,Math.round(val/meta*100));return`<div style="margin-bottom:12px"><div style="display:flex;justify-content:space-between;margin-bottom:3px;font-size:12px"><span style="color:var(--tx2)">${lbl}</span><span style="font-weight:700;color:${p>=100?'var(--gr)':p>=60?'var(--am)':'var(--rd)'}">${p}%</span></div><div style="font-size:10px;color:var(--tx3);margin-bottom:3px">${R(val)} / ${R(meta)}</div><div class="prog"><div class="prog-f ${p>=100?'gr':p>=60?'am':'re'}" style="width:${p}%"></div></div></div>`;}).join('')}</div>
    <div class="card"><div class="card-t">📊 Distribuição de gastos</div><div class="bar-chart">${gasto>0?S.gastos.map(g=>`<div class="bar-row"><div class="bar-lbl">${g.desc}</div><div class="bar-track"><div class="bar-f" style="width:${Math.round(g.valor/gasto*100)}%;background:var(--rd)"></div></div><div class="bar-val" style="color:var(--rd)">R$${g.valor}</div></div>`).join(''):'<div style="color:var(--tx3);text-align:center;padding:12px;font-size:12px">Nenhum gasto registrado</div>'}</div></div>
  </div>
  <div class="card"><div class="card-t">🧾 Lançamentos</div><div class="tw" style="border:none;margin:0"><table><thead><tr><th>Descrição</th><th>Data</th><th>Valor</th><th style="width:10%">Ação</th></tr></thead><tbody>${S.gastos.map((g,i)=>`<tr><td>${g.desc}</td><td style="color:var(--tx2)">${g.data}</td><td style="color:var(--rd);font-weight:700">R$${g.valor.toFixed(2)}</td><td><button class="btn danger sm" onclick="S.gastos.splice(${i},1);render();auto()">🗑</button></td></tr>`).join('')}</tbody></table></div></div>`;
}

function closeM(){document.getElementById('mroot').innerHTML='';}
function mBtn(label,action,cls='ghost'){return`<button class="btn ${cls}" onclick="${action}">${label}</button>`;}

// ---- CATEGORIAS ----
function mGerirCats(){
  openM(`<div class="modal-t">🏷️ Gerenciar Categorias <button class="xbtn" onclick="closeM()">✕</button></div>

function remCat(i){S.categorias.splice(i,1);document.getElementById('cat-list').innerHTML=S.categorias.map((c,i)=>`<span class="cat-chip">${c}<button class="x" onclick="remCat(${i})">✕</button></span>`).join('');}

function salvarNovoLead(){S.leads.push({id:S.nextLead++,nome:document.getElementById('ln').value||'Lead',tel:document.getElementById('lt').value||'—',interesse:document.getElementById('li').value||'—',origem:document.getElementById('lo').value,status:document.getElementById('ls').value,valorEst:+document.getElementById('lv').value||0,obs:document.getElementById('lobs').value||'',data:new Date().toISOString().slice(0,10)});closeM();render();auto();}
function mEditLead(id){const l=S.leads.find(x=>x.id===id);if(!l)return;openM(`<div class="modal-t">Editar Lead <button class="xbtn" onclick="closeM()">✕</button></div>
  <div class="fg"><div class="fl"><label>Nome</label><input id="en" value="${l.nome}"></div><div class="fl"><label>Telefone</label><input id="et" value="${l.tel}"></div><div class="fl"><label>Interesse</label><input id="ei" value="${l.interesse}"></div><div class="fl"><label>Origem</label><select id="eori">${ORIGENS.map(o=>`<option ${l.origem===o?'selected':''}>${o}</option>`).join('')}</select></div><div class="fl"><label>Status</label><select id="es">${STATUS_LEAD.map(s=>`<option ${l.status===s?'selected':''}>${s}</option>`).join('')}</select></div><div class="fl"><label>Valor est. (R$)</label><input id="ev" type="number" value="${l.valorEst}"></div></div>
  <div class="fl" style="margin-top:8px"><label>Obs</label><textarea id="eobs">${l.obs||''}</textarea></div>
  <div style="display:flex;gap:8px;margin-top:14px;justify-content:flex-end"><button class="btn ghost" onclick="closeM()">Cancelar</button><button class="btn" onclick="salvarEditLead(${id})">Salvar</button></div>`);}
function salvarEditLead(id){const l=S.leads.find(x=>x.id===id);if(!l)return;l.nome=document.getElementById('en').value;l.tel=document.getElementById('et').value;l.interesse=document.getElementById('ei').value;l.origem=document.getElementById('eori').value;l.status=document.getElementById('es').value;l.valorEst=+document.getElementById('ev').value;l.obs=document.getElementById('eobs').value;closeM();render();auto();}
function delLead(id){if(confirm('Excluir lead?')){S.leads=S.leads.filter(l=>l.id!==id);render();auto();}}

// ---- GARANTIAS ----
function mNovaGar(){openM(`<div class="modal-t">Nova Garantia <button class="xbtn" onclick="closeM()">✕</button></div>
  <div class="fg"><div class="fl"><label>Cliente</label><input id="gc" list="cli-dl"><datalist id="cli-dl">${S.clientes.map(c=>`<option>${c.nome}</option>`).join('')}</datalist></div><div class="fl"><label>Serviço</label><input id="gs"></div><div class="fl"><label>Data do serviço</label><input id="gd" type="date" value="${new Date().toISOString().slice(0,10)}"></div><div class="fl"><label>Prazo (dias)</label><input id="gp" type="number" value="90"></div></div>
  <div class="fl" style="margin-top:8px"><label>Obs</label><input id="go" placeholder="Ex: SSD Kingston 240GB"></div>
  <div style="display:flex;gap:8px;margin-top:14px;justify-content:flex-end"><button class="btn ghost" onclick="closeM()">Cancelar</button><button class="btn" onclick="salvarNovaGar()">Salvar</button></div>`);}
function salvarNovaGar(){S.garantias.push({id:S.nextGar++,cliente:document.getElementById('gc').value||'—',servico:document.getElementById('gs').value||'—',dataServico:document.getElementById('gd').value,diasGarantia:+document.getElementById('gp').value||90,obs:document.getElementById('go').value||''});closeM();render();auto();}

// ---- ESTOQUE ----
function mNovoEst(){openM(`<div class="modal-t">Novo Item de Estoque <button class="xbtn" onclick="closeM()">✕</button></div>
  <div class="fg"><div class="fl"><label>Nome</label><input id="en"></div><div class="fl"><label>Categoria</label><input id="ec" placeholder="Ex: Hardware, Cabos..."></div><div class="fl"><label>Quantidade</label><input id="eq" type="number" value="1"></div><div class="fl"><label>Unidade</label><select id="eun">${UNIDADES.map(u=>`<option>${u}</option>`).join('')}</select></div><div class="fl"><label>Qtd mínima</label><input id="eqm" type="number" value="2"></div><div class="fl"><label>Custo unit. (R$)</label><input id="ecu" type="number"></div><div class="fl"><label>Local físico</label><input id="eloc" placeholder="Ex: Gaveta 1, Carro..."></div><div class="fl"><label>Fornecedor</label><input id="ef"></div></div>
  <div style="display:flex;gap:8px;margin-top:14px;justify-content:flex-end"><button class="btn ghost" onclick="closeM()">Cancelar</button><button class="btn" onclick="salvarNovoEst()">Salvar</button></div>`);}
function salvarNovoEst(){S.estoque.push({id:S.nextEst++,nome:document.getElementById('en').value||'Item',cat:document.getElementById('ec').value||'Geral',qtd:+document.getElementById('eq').value||0,unidade:document.getElementById('eun').value||'un',qtdMin:+document.getElementById('eqm').value||1,custo:+document.getElementById('ecu').value||0,local:document.getElementById('eloc').value||'—',fornecedor:document.getElementById('ef').value||'—',obs:''});closeM();render();auto();}
function mEditEst(id){const e=S.estoque.find(x=>x.id===id);if(!e)return;openM(`<div class="modal-t">Editar: ${e.nome} <button class="xbtn" onclick="closeM()">✕</button></div>
  <div class="fg"><div class="fl"><label>Nome</label><input id="en" value="${e.nome}"></div><div class="fl"><label>Categoria</label><input id="ec" value="${e.cat}"></div><div class="fl"><label>Quantidade</label><input id="eq" type="number" value="${e.qtd}"></div><div class="fl"><label>Unidade</label><select id="eun">${UNIDADES.map(u=>`<option ${u===e.unidade?'selected':''}>${u}</option>`).join('')}</select></div><div class="fl"><label>Qtd mínima</label><input id="eqm" type="number" value="${e.qtdMin}"></div><div class="fl"><label>Custo unit. (R$)</label><input id="ecu" type="number" value="${e.custo}"></div><div class="fl"><label>Local físico</label><input id="eloc" value="${e.local||''}"></div><div class="fl"><label>Fornecedor</label><input id="ef" value="${e.fornecedor}"></div></div>
  <div class="fl" style="margin-top:8px"><label>Obs</label><input id="eobs" value="${e.obs||''}"></div>
  <div style="display:flex;gap:8px;margin-top:14px;justify-content:flex-end"><button class="btn ghost" onclick="closeM()">Cancelar</button><button class="btn" onclick="salvarEditEst(${id})">Salvar</button></div>`);}
function salvarEditEst(id){const e=S.estoque.find(x=>x.id===id);if(!e)return;e.nome=document.getElementById('en').value;e.cat=document.getElementById('ec').value;e.qtd=+document.getElementById('eq').value;e.unidade=document.getElementById('eun').value;e.qtdMin=+document.getElementById('eqm').value;e.custo=+document.getElementById('ecu').value;e.local=document.getElementById('eloc').value;e.fornecedor=document.getElementById('ef').value;e.obs=document.getElementById('eobs').value;closeM();render();auto();}
function delEst(id){if(confirm('Excluir este item do estoque?')){S.estoque=S.estoque.filter(e=>e.id!==id);render();auto();}}
function mEntrada(id){const e=S.estoque.find(x=>x.id===id);if(!e)return;openM(`<div class="modal-t">+ Entrada: ${e.nome} <button class="xbtn" onclick="closeM()">✕</button></div>
  <div class="fg"><div class="fl"><label>Quantidade (${e.unidade||'un'})</label><input id="mq" type="number" value="1"></div><div class="fl"><label>Obs</label><input id="mob" value="Compra"></div></div>
  <div style="display:flex;gap:8px;margin-top:14px;justify-content:flex-end"><button class="btn ghost" onclick="closeM()">Cancelar</button><button class="btn success" onclick="confEnt(${id})">+ Confirmar</button></div>`);}
function confEnt(id){const e=S.estoque.find(x=>x.id===id);const q=+document.getElementById('mq').value||1;e.qtd+=q;S.movEstoque.unshift({data:new Date().toISOString().slice(0,10),item:e.nome,tipo:'Entrada',qtd:q,unidade:e.unidade||'un',obs:document.getElementById('mob').value});closeM();render();auto();}
function mSaida(id){const e=S.estoque.find(x=>x.id===id);if(!e)return;openM(`<div class="modal-t">- Saída: ${e.nome} (${e.qtd} ${e.unidade||'un'}) <button class="xbtn" onclick="closeM()">✕</button></div>
  <div class="fg"><div class="fl"><label>Quantidade (${e.unidade||'un'})</label><input id="mq" type="number" value="1" max="${e.qtd}"></div><div class="fl"><label>Motivo</label><input id="mob" placeholder="Ex: ORC-006"></div></div>
  <div style="display:flex;gap:8px;margin-top:14px;justify-content:flex-end"><button class="btn ghost" onclick="closeM()">Cancelar</button><button class="btn danger" onclick="confSai(${id})">- Confirmar</button></div>`);}
function confSai(id){const e=S.estoque.find(x=>x.id===id);const q=Math.min(+document.getElementById('mq').value||1,e.qtd);e.qtd-=q;S.movEstoque.unshift({data:new Date().toISOString().slice(0,10),item:e.nome,tipo:'Saída',qtd:q,unidade:e.unidade||'un',obs:document.getElementById('mob').value});closeM();render();auto();}
function mMovEst(){openM(`<div class="modal-t">📋 Movimentações <button class="xbtn" onclick="closeM()">✕</button></div>
  <div class="tw" style="margin-bottom:0"><table><thead><tr><th>Data</th><th>Item</th><th>Tipo</th><th>Qtd</th><th>Un.</th><th>Obs</th></tr></thead><tbody>${S.movEstoque.map(m=>`<tr><td style="font-size:11px">${m.data}</td><td style="font-weight:600">${m.item}</td><td><span class="badge ${m.tipo==='Entrada'?'gr':'re'}">${m.tipo}</span></td><td style="font-weight:700;color:${m.tipo==='Entrada'?'var(--gr)':'var(--rd)'}">${m.tipo==='Entrada'?'+':'-'}${m.qtd}</td><td style="color:var(--tx3);font-size:11px">${m.unidade||'un'}</td><td style="font-size:11px;color:var(--tx2)">${m.obs}</td></tr>`).join('')}</tbody></table></div>`);}
function mBalanco(){
  const hoje=new Date().toLocaleDateString('pt-BR');
  const vt=S.estoque.reduce((a,e)=>a+e.custo*e.qtd,0);
  openM(`<div class="modal-t">📊 Balanço de Estoque — ${hoje} <button class="xbtn" onclick="closeM()">✕</button></div>
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px">
    <div class="kpi gr"><div class="kpi-l">Itens OK</div><div class="kpi-v">${S.estoque.filter(e=>e.qtd>e.qtdMin).length}</div></div>
    <div class="kpi am"><div class="kpi-l">Baixo estoque</div><div class="kpi-v">${S.estoque.filter(e=>e.qtd>0&&e.qtd<=e.qtdMin).length}</div></div>
    <div class="kpi bl"><div class="kpi-l">Valor total</div><div class="kpi-v">${R(vt)}</div></div>
  </div>
  <div class="tw" style="margin-bottom:0"><table><thead><tr><th>Item</th><th>Cat</th><th>Qtd</th><th>Un.</th><th>Custo</th><th>Total</th><th>Local</th><th>Status</th></tr></thead>
  <tbody>${S.estoque.map(e=>`<tr><td style="font-weight:600">${e.nome}</td><td>${e.cat}</td><td style="font-weight:700;color:${e.qtd===0?'var(--rd)':e.qtd<=e.qtdMin?'var(--am)':'var(--gr)'}">${e.qtd}</td><td style="color:var(--tx3);font-size:11px">${e.unidade||'un'}</td><td>R$${e.custo.toFixed(2)}</td><td style="color:var(--bl3);font-weight:600">R$${(e.custo*e.qtd).toFixed(2)}</td><td style="color:var(--tx2);font-size:11px">${e.local||'—'}</td><td><span class="badge ${e.qtd===0?'re':e.qtd<=e.qtdMin?'am':'gr'}">${e.qtd===0?'ZERO':e.qtd<=e.qtdMin?'Baixo':'OK'}</span></td></tr>`).join('')}</tbody></table></div>
  <div style="text-align:right;margin-top:10px;font-size:11px;color:var(--tx3)">Balanço gerado em ${hoje}</div>`);
}

// ---- AGENDA ----
function mNovoAg(){openM(`<div class="modal-t">Novo Compromisso <button class="xbtn" onclick="closeM()">✕</button></div>
  <div class="fg"><div class="fl"><label>Título</label><input id="at" placeholder="Ex: João - Formatação"></div><div class="fl"><label>Dia do mês</label><input id="ad" type="number" min="1" max="31" value="11"></div><div class="fl"><label>Horário</label><input id="ah" type="time" value="09:00"></div><div class="fl"><label>Tipo</label><select id="atipo"><option>Serviço</option><option>Instalação</option><option>Orçamento</option><option>Comercial</option><option>Pessoal</option></select></div><div class="fl"><label>Status</label><select id="ast"><option>Confirmado</option><option>Aguardando</option></select></div><div class="fl"><label>Obs</label><input id="ao"></div></div>
  <div style="display:flex;gap:8px;margin-top:14px;justify-content:flex-end"><button class="btn ghost" onclick="closeM()">Cancelar</button><button class="btn" onclick="salvarNovoAg()">Salvar</button></div>`);}
function salvarNovoAg(){S.agenda.push({id:S.nextAg++,dia:+document.getElementById('ad').value||11,titulo:document.getElementById('at').value||'Compromisso',hora:document.getElementById('ah').value||'09:00',status:document.getElementById('ast').value,tipo:document.getElementById('atipo').value,obs:document.getElementById('ao').value||''});closeM();render();auto();}
function delAg(id){if(confirm('Excluir?')){S.agenda=S.agenda.filter(a=>a.id!==id);render();auto();}}
function toggleAg(id){const a=S.agenda.find(x=>x.id===id);if(!a)return;a.status=a.status==='Confirmado'?'Aguardando':'Confirmado';render();auto();}

// ---- FINANCEIRO ----
function mNovoGasto(){openM(`<div class="modal-t">💸 Novo Gasto <button class="xbtn" onclick="closeM()">✕</button></div>
  <div class="fg"><div class="fl"><label>Descrição</label><input id="gd" placeholder="Ex: Combustível"></div><div class="fl"><label>Valor (R$)</label><input id="gv" type="number"></div><div class="fl"><label>Data</label><input id="gdt" type="date" value="${new Date().toISOString().slice(0,10)}"></div></div>
  <div style="display:flex;gap:8px;margin-top:14px;justify-content:flex-end"><button class="btn ghost" onclick="closeM()">Cancelar</button><button class="btn danger" onclick="salvarGasto()">Registrar</button></div>`);}
function salvarGasto(){const v=+document.getElementById('gv').value||0;S.gastos.push({desc:document.getElementById('gd').value||'Gasto',valor:v,data:document.getElementById('gdt').value});closeM();render();auto();}

// ---- CONFIG ----
function salvarConfig(){
  S.cfg.empresa=document.getElementById('cf-emp').value||S.cfg.empresa;
  S.cfg.sub=document.getElementById('cf-sub').value||S.cfg.sub;
  S.cfg.cnpj=document.getElementById('cf-cnpj').value;
  S.cfg.tel=document.getElementById('cf-tel').value;
  S.cfg.cidade=document.getElementById('cf-cid').value;
  S.cfg.metaMensal=+document.getElementById('cf-mmen').value||S.cfg.metaMensal;
  S.cfg.metaSemanal=+document.getElementById('cf-msem').value||S.cfg.metaSemanal;
  S.cfg.metaAnual=+document.getElementById('cf-manu').value||S.cfg.metaAnual;
  S.cfg.impostoMEI=+document.getElementById('cf-imei').value||0;
  S.cfg.impostoNF=+document.getElementById('cf-inf').value||0;
  S.cfg.deslBase=+document.getElementById('cf-desb').value||S.cfg.deslBase;
  S.cfg.deslKmExtra=+document.getElementById('cf-deskm').value||S.cfg.deslKmExtra;
  S.cfg.urgencial=+document.getElementById('cf-urg').value||S.cfg.urgencial;
  const maq=S.cfg.maquininha;
  maq.debito=+document.getElementById('maq-deb').value||maq.debito;
  maq.credito1=+document.getElementById('maq-c1').value||maq.credito1;
  for(let p=2;p<=12;p++){const el=document.getElementById('maq-c'+p);if(el)maq['credito'+p]=+el.value||0;}
  const tl=document.getElementById('top-logo');
  if(tl){tl.childNodes[0].textContent=S.cfg.empresa+' ';document.getElementById('top-sub').textContent='· '+S.cfg.sub;}
  alert('✅ Configurações salvas!');render();auto();
}

render();
</script>
