// ── Gerador principal ────────────────────────────────────────
async function gerarPDF(){
  const tpl = PDF.template;

  // Mostra loading
  const loadDiv = document.createElement('div');
  loadDiv.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:9999;display:flex;align-items:center;justify-content:center;font-size:14px;color:#fff;font-family:DM Sans,sans-serif;flex-direction:column;gap:12px';
  loadDiv.innerHTML = '<div style="font-size:32px">📄</div><div>Gerando PDF...</div>';
  document.body.appendChild(loadDiv);

  try {
    await loadJsPDF();
    const { jsPDF } = window.jspdf;

    if(tpl === 'orcamento')   await gerarPDFOrcamento(jsPDF);
    else if(tpl === 'recibo') await gerarPDFRecibo(jsPDF);
    else if(tpl === 'laudo')  await gerarPDFLaudo(jsPDF);
    else if(tpl === 'relatorio') await gerarPDFRelatorio(jsPDF);

  } catch(e){
    alert('Erro ao gerar PDF: ' + e.message);
  } finally {
    document.body.removeChild(loadDiv);
  }
}

// ── Helpers de desenho ───────────────────────────────────────
function pdfHeader(doc, titulo, subtitulo, campos){
  const emp  = campos['pdf-emp']  || S.cfg.empresa;
  const tel  = campos['pdf-emp-tel'] || S.cfg.tel;
  const cid  = campos['pdf-cidade']  || S.cfg.cidade;
  const cnpj = campos['pdf-cnpj']    || S.cfg.cnpj || '';

  // Fundo roxo header
  doc.setFillColor(18, 16, 42);
  doc.rect(0, 0, 210, 42, 'F');

  // Linha accent
  doc.setFillColor(124, 77, 255);
  doc.rect(0, 0, 5, 42, 'F');

  // Nome da empresa
  doc.setTextColor(232, 226, 255);
  doc.setFontSize(18);
  doc.setFont('helvetica','bold');
  doc.text(emp, 14, 16);

  // Sub empresa
  doc.setFontSize(8);
  doc.setFont('helvetica','normal');
  doc.setTextColor(122, 111, 168);
  doc.text(`${S.cfg.sub}  ·  ${tel}  ·  ${cid}${cnpj?' · '+cnpj:''}`, 14, 23);

  // Título do documento (direita)
  doc.setFontSize(14);
  doc.setFont('helvetica','bold');
  doc.setTextColor(156, 111, 255);
  doc.text(titulo, 196, 14, {align:'right'});
  doc.setFontSize(8);
  doc.setFont('helvetica','normal');
  doc.setTextColor(122, 111, 168);
  doc.text(subtitulo, 196, 21, {align:'right'});

  // Linha separadora
  doc.setDrawColor(124, 77, 255);
  doc.setLineWidth(0.3);
  doc.line(0, 42, 210, 42);

  return 50; // y inicial após header
}

function pdfFooter(doc, pageCount){
  const totalPages = doc.internal.getNumberOfPages();
  for(let i=1;i<=totalPages;i++){
    doc.setPage(i);
    doc.setFillColor(18, 16, 42);
    doc.rect(0, 285, 210, 12, 'F');
    doc.setFontSize(7);
    doc.setTextColor(122, 111, 168);
    doc.setFont('helvetica','normal');
    doc.text(S.cfg.empresa + ' — ' + S.cfg.sub, 14, 291);
    doc.text('Página '+i+'/'+totalPages, 196, 291, {align:'right'});
    doc.text(S.cfg.tel + '  ·  ' + S.cfg.cidade, 105, 291, {align:'center'});
  }
}

function pdfCampos(doc){
  // Lê campos do modal se estiver aberto, senão retorna objeto vazio
  const ids = ['pdf-num','pdf-data','pdf-val','pdf-status','pdf-cli','pdf-tel','pdf-end',
    'pdf-desc','pdf-desc2','pdf-valor','pdf-tempo','pdf-gar','pdf-obs','pdf-emp','pdf-emp-tel',
    'pdf-cidade','pdf-cnpj','pdf-forma','pdf-cpf','pdf-equip','pdf-modelo','pdf-serie',
    'pdf-problema','pdf-diag','pdf-solucao','pdf-pecas','pdf-tecnico',
    'pdf-periodo','pdf-resp','pdf-meta','pdf-fat','pdf-gastos','pdf-os','pdf-analise','pdf-metas-prox'];
  const out = {};
  ids.forEach(id => {
    const el = document.getElementById(id);
    if(el) out[id] = el.value;
  });
  // fallbacks a partir do orçamento selecionado
  if(!out['pdf-emp']) out['pdf-emp'] = S.cfg.empresa;
  if(!out['pdf-emp-tel']) out['pdf-emp-tel'] = S.cfg.tel;
  if(!out['pdf-cidade']) out['pdf-cidade'] = S.cfg.cidade;
  return out;
}

function pdfSecTitle(doc, y, txt){
  doc.setFillColor(33, 28, 64);
  doc.rect(14, y-4, 182, 8, 'F');
  doc.setFontSize(8);
  doc.setFont('helvetica','bold');
  doc.setTextColor(156, 111, 255);
  doc.text(txt, 16, y+1);
  return y + 8;
}

function pdfRow(doc, y, label, value, accent=false){
  doc.setFontSize(9);
  doc.setFont('helvetica','normal');
  doc.setTextColor(122, 111, 168);
  doc.text(label, 16, y);
  doc.setFont('helvetica', accent?'bold':'normal');
  doc.setTextColor(accent ? [156,111,255] : [232,226,255]);
  doc.text(String(value||'—'), 75, y);
  return y + 6;
}

function pdfTextBlock(doc, y, label, text, maxWidth=176){
  doc.setFontSize(8);
  doc.setFont('helvetica','bold');
  doc.setTextColor(122, 111, 168);
  doc.text(label, 16, y);
  y += 5;
  doc.setFont('helvetica','normal');
  doc.setTextColor(232, 226, 255);
  const lines = doc.splitTextToSize(text || '—', maxWidth);
  doc.text(lines, 16, y);
  return y + lines.length * 4.5 + 4;
}

// ── Template: ORÇAMENTO ──────────────────────────────────────
async function gerarPDFOrcamento(jsPDF){
  const c = pdfCampos();
  const orc = PDF.orcId ? S.orc.find(o=>o.id===PDF.orcId) : null;
  const doc = new jsPDF({unit:'mm',format:'a4',orientation:'portrait'});

  let y = pdfHeader(doc, 'ORÇAMENTO', (c['pdf-num']||'ORC-XXX')+'  ·  '+( c['pdf-data']||new Date().toLocaleDateString('pt-BR')), c);

  // Status badge visual
  const statusColor = {Aprovado:[34,215,135],Aguardando:[245,197,24],Recusado:[255,78,106]};
  const st = c['pdf-status'] || 'Aguardando';
  const sc = statusColor[st] || [122,111,168];
  doc.setFillColor(...sc);
  doc.roundedRect(14, y-2, 30, 7, 2, 2, 'F');
  doc.setFontSize(8); doc.setFont('helvetica','bold'); doc.setTextColor(10,8,26);
  doc.text(st, 29, y+3, {align:'center'});
  y += 12;

  // CLIENTE
  y = pdfSecTitle(doc, y, 'DADOS DO CLIENTE');
  y = pdfRow(doc, y, 'Nome', c['pdf-cli']);
  y = pdfRow(doc, y, 'Telefone', c['pdf-tel']);
  y = pdfRow(doc, y, 'Endereço', c['pdf-end']);
  y += 4;

  // SERVIÇOS
  y = pdfSecTitle(doc, y, 'SERVIÇOS / DESCRIÇÃO');

  // Tabela de itens (usa autoTable)
  const orcItems = [];
  if(orc && S.calcItems && S.calcItems.length){
    S.calcItems.forEach(it=>{
      const sv = S.services.find(x=>x.id===it.id);
      if(sv) orcItems.push([sv.nome, sv.cat, it.qty, 'R$ '+sv.medVal.toFixed(2), 'R$ '+(sv.medVal*it.qty).toFixed(2)]);
    });
  }
  if(!orcItems.length && c['pdf-desc']){
    orcItems.push([c['pdf-desc'], '—', 1, 'R$ '+(+c['pdf-valor']||0).toFixed(2), 'R$ '+(+c['pdf-valor']||0).toFixed(2)]);
  }
  if(!orcItems.length){
    orcItems.push(['Serviço técnico', '—', 1, 'R$ '+( +c['pdf-valor']||0).toFixed(2), 'R$ '+(+c['pdf-valor']||0).toFixed(2)]);
  }

  doc.autoTable({
    startY: y,
    head: [['Descrição','Categoria','Qtd','Valor unit.','Subtotal']],
    body: orcItems,
    theme: 'plain',
    headStyles:{fillColor:[33,28,64],textColor:[156,111,255],fontStyle:'bold',fontSize:8},
    bodyStyles:{fillColor:[19,16,42],textColor:[232,226,255],fontSize:8},
    alternateRowStyles:{fillColor:[26,21,53]},
    margin:{left:14,right:14},
    columnStyles:{0:{cellWidth:70},1:{cellWidth:30},2:{cellWidth:15,halign:'center'},3:{cellWidth:30,halign:'right'},4:{cellWidth:30,halign:'right'}},
  });
  y = doc.lastAutoTable.finalY + 4;

  // Total
  const desc2 = +c['pdf-desc2']||0;
  const valTotal = +c['pdf-valor']||0;
  const valFinal = valTotal - desc2;
  doc.setFillColor(124, 77, 255);
  doc.rect(110, y, 86, 10, 'F');
  doc.setFontSize(10); doc.setFont('helvetica','bold'); doc.setTextColor(255,255,255);
  doc.text('TOTAL:', 114, y+7);
  doc.text('R$ '+valFinal.toFixed(2).replace('.',','), 194, y+7, {align:'right'});
  y += 14;

  if(desc2>0){
    doc.setFontSize(8); doc.setFont('helvetica','normal'); doc.setTextColor(245,197,24);
    doc.text('Desconto aplicado: R$ '+desc2.toFixed(2).replace('.',','), 196, y, {align:'right'});
    y += 6;
  }

  // CONDIÇÕES
  y += 2;
  y = pdfSecTitle(doc, y, 'CONDIÇÕES E VALIDADE');
  y = pdfRow(doc, y, 'Validade do orçamento', c['pdf-val']||'7 dias');
  y = pdfRow(doc, y, 'Prazo de execução', c['pdf-tempo']||'A confirmar');
  y = pdfRow(doc, y, 'Garantia', c['pdf-gar']||'90 dias');
  y += 4;

  if(c['pdf-obs']){
    y = pdfTextBlock(doc, y, 'OBSERVAÇÕES', c['pdf-obs']);
    y += 2;
  }

  // Assinatura
  if(y > 230) doc.addPage();
  y = Math.max(y, 230);
  doc.setDrawColor(60,50,100);
  doc.setLineWidth(0.3);
  doc.line(14, y+20, 90, y+20);
  doc.line(115, y+20, 196, y+20);
  doc.setFontSize(8); doc.setFont('helvetica','normal'); doc.setTextColor(122,111,168);
  doc.text('Assinatura do cliente', 52, y+25, {align:'center'});
  doc.text(c['pdf-emp']||S.cfg.empresa, 155, y+25, {align:'center'});
  doc.text(c['pdf-data']||new Date().toLocaleDateString('pt-BR'), 155, y+30, {align:'center'});

  pdfFooter(doc);
  doc.save('orcamento-'+(c['pdf-num']||'GBR')+'.pdf');
}

async function gerarPDFLaudo(jsPDF){
  const c = pdfCampos();

  let y = pdfHeader(doc, 'LAUDO TÉCNICO', (c['pdf-num']||'LAU-XXX')+'  ·  '+(c['pdf-data']||''), c);

  y = pdfSecTitle(doc, y, 'IDENTIFICAÇÃO DO CLIENTE');

  y = pdfSecTitle(doc, y, 'IDENTIFICAÇÃO DO EQUIPAMENTO');
  y = pdfRow(doc, y, 'Equipamento', c['pdf-equip']);
  y = pdfRow(doc, y, 'Marca / Modelo', c['pdf-modelo']);
  y = pdfRow(doc, y, 'Nº de Série', c['pdf-serie']);
  y += 4;

  y = pdfTextBlock(doc, y, 'PROBLEMA RELATADO PELO CLIENTE', c['pdf-problema']);
  y += 2;
  y = pdfTextBlock(doc, y, 'DIAGNÓSTICO TÉCNICO', c['pdf-diag']);
  y += 2;
  y = pdfTextBlock(doc, y, 'SOLUÇÃO APLICADA / SERVIÇOS REALIZADOS', c['pdf-solucao']);
  y += 2;

  if(c['pdf-pecas']){
    y = pdfTextBlock(doc, y, 'PEÇAS / MATERIAIS UTILIZADOS', c['pdf-pecas']);
    y += 2;
  }

  y = pdfSecTitle(doc, y, 'RESULTADO E GARANTIA');
  y = pdfRow(doc, y, 'Técnico responsável', c['pdf-tecnico']||'Gabriel Rufino', true);
  y = pdfRow(doc, y, 'Garantia', c['pdf-gar']||'90 dias', true);

// ── Template: RELATÓRIO MENSAL ───────────────────────────────
async function gerarPDFRelatorio(jsPDF){
  const c = pdfCampos();
  const doc = new jsPDF({unit:'mm',format:'a4',orientation:'portrait'});

  const aprov    = S.orc.filter(o=>o.status==='Aprovado');
  const fat      = +c['pdf-fat']  || aprov.reduce((a,o)=>a+o.valor,0);
  const gastos   = +c['pdf-gastos']|| S.gastos.reduce((a,g)=>a+g.valor,0);
  const meta     = +c['pdf-meta'] || S.cfg.metaMensal;
  const resultado= fat - gastos;
  const pctMeta  = meta>0 ? Math.min(100,Math.round(fat/meta*100)) : 0;

  let y = pdfHeader(doc, 'RELATÓRIO MENSAL', (c['pdf-periodo']||'')+'  ·  Gerado: '+(c['pdf-data']||''), c);

  // KPIs
  const kpis = [
    ['Faturamento',   'R$ '+fat.toLocaleString('pt-BR',{minimumFractionDigits:2}),   [34,215,135]],
    ['Gastos',        'R$ '+gastos.toLocaleString('pt-BR',{minimumFractionDigits:2}), [255,78,106]],
    ['Resultado',     'R$ '+resultado.toLocaleString('pt-BR',{minimumFractionDigits:2}), resultado>=0?[34,215,135]:[255,78,106]],
    ['Meta',          'R$ '+meta.toLocaleString('pt-BR',{minimumFractionDigits:2}),  [245,197,24]],
    ['Meta atingida', pctMeta+'%',                                                    pctMeta>=100?[34,215,135]:pctMeta>=60?[245,197,24]:[255,78,106]],
    ['OS aprovadas',  c['pdf-os']||String(aprov.length),                              [156,111,255]],
  ];

  const kpiW=30, kpiH=16, kpiGap=2, kpiX=14;
  kpis.forEach(([label,val,col],i)=>{
    const kx = kpiX + i*(kpiW+kpiGap);
    doc.setFillColor(33,28,64);
    doc.roundedRect(kx, y, kpiW, kpiH, 2, 2, 'F');
    doc.setFillColor(...col);
    doc.rect(kx, y, 2, kpiH, 'F');
    doc.setFontSize(7); doc.setFont('helvetica','normal'); doc.setTextColor(122,111,168);
    doc.text(label, kx+4, y+5);
    doc.setFontSize(9); doc.setFont('helvetica','bold'); doc.setTextColor(...col);
    doc.text(String(val), kx+4, y+13);
  });
  y += kpiH + 6;

  // Barra de meta
  y = pdfSecTitle(doc, y, 'PROGRESSO DA META');
  doc.setFillColor(33,28,64);
  doc.rect(14, y, 182, 8, 'F');
  doc.setFillColor(pctMeta>=100?34:pctMeta>=60?245:255, pctMeta>=100?215:pctMeta>=60?197:78, pctMeta>=100?135:pctMeta>=60?24:106);
  doc.rect(14, y, Math.round(182*pctMeta/100), 8, 'F');
  doc.setFontSize(7); doc.setFont('helvetica','bold'); doc.setTextColor(255,255,255);
  doc.text(pctMeta+'% da meta atingida', 105, y+5.5, {align:'center'});
  y += 12;

  // Tabela OS
  y = pdfSecTitle(doc, y, 'ORÇAMENTOS / OS DO PERÍODO');
  doc.autoTable({
    startY: y,
    head: [['OS','Cliente','Serviço','Valor','Lucro','Status']],
    body: S.orc.map(o=>[o.id,o.cliente,o.tipo.slice(0,30),
      'R$ '+o.valor.toFixed(2).replace('.',','),
      'R$ '+o.lucro.toFixed(2).replace('.',','),
      o.status]),
    theme: 'plain',
    headStyles:{fillColor:[33,28,64],textColor:[156,111,255],fontStyle:'bold',fontSize:7},
    bodyStyles:{fillColor:[19,16,42],textColor:[232,226,255],fontSize:7},
    alternateRowStyles:{fillColor:[26,21,53]},
    margin:{left:14,right:14},
    columnStyles:{
      0:{cellWidth:22},1:{cellWidth:38},2:{cellWidth:55},
      3:{cellWidth:22,halign:'right'},4:{cellWidth:22,halign:'right'},5:{cellWidth:22,halign:'center'}
    },
    didDrawCell: (data)=>{
      if(data.column.index===5 && data.section==='body'){
        const st=data.cell.raw;
        const cc=st==='Aprovado'?[34,215,135]:st==='Aguardando'?[245,197,24]:[255,78,106];
        doc.setTextColor(...cc);
        doc.setFont('helvetica','bold');
      }
    }
  });
  y = doc.lastAutoTable.finalY + 4;

  // Gastos
  if(S.gastos.length){
    y = pdfSecTitle(doc, y, 'GASTOS DO PERÍODO');
    doc.autoTable({
      startY: y,
      head:[['Descrição','Data','Valor']],
      body: S.gastos.map(g=>[g.desc, g.data, 'R$ '+g.valor.toFixed(2).replace('.',',')]),
      theme:'plain',
      headStyles:{fillColor:[33,28,64],textColor:[255,78,106],fontStyle:'bold',fontSize:7},
      bodyStyles:{fillColor:[19,16,42],textColor:[232,226,255],fontSize:7},
      alternateRowStyles:{fillColor:[26,21,53]},
      margin:{left:14,right:14},
      columnStyles:{0:{cellWidth:100},1:{cellWidth:40},2:{cellWidth:40,halign:'right'}},
    });
    y = doc.lastAutoTable.finalY + 4;
  }

  // Análise
  if(c['pdf-analise']){
    y = pdfTextBlock(doc, y, 'ANÁLISE DO MÊS', c['pdf-analise']);
    y += 2;
  }
  if(c['pdf-metas-prox']){
    y = pdfTextBlock(doc, y, 'METAS PARA O PRÓXIMO MÊS', c['pdf-metas-prox']);
  }

  // Assinatura
  if(y > 255) doc.addPage(), y = 20;
  y = Math.max(y+10, 255);
  doc.setDrawColor(60,50,100); doc.setLineWidth(0.3);
  doc.line(115, y, 196, y);
  doc.setFontSize(8); doc.setFont('helvetica','normal'); doc.setTextColor(122,111,168);
  doc.text(c['pdf-resp']||'Gabriel Rufino', 155, y+5, {align:'center'});
  doc.text(c['pdf-data']||new Date().toLocaleDateString('pt-BR'), 155, y+10, {align:'center'});

  pdfFooter(doc);
  doc.save('relatorio-'+( c['pdf-periodo']||new Date().toLocaleDateString('pt-BR'))+'.pdf');
}

function updateBottomNav(page){
  document.querySelectorAll('.bottom-nav .bn-item').forEach(el => {
    const p = el.getAttribute('data-page');
    el.classList.toggle('active', p === page);
  });
  document.querySelectorAll('.bottom-nav-more-menu .bnm-item').forEach(el => {
    const p = el.getAttribute('data-page');
    el.classList.toggle('active', p === page);
  });
  const sb = document.querySelector('.sidebar');
  if(sb) sb.classList.remove('open');
  const titles = {
    dash:'Dashboard', servicos:'Serviços', calc:'Calculadora', orc:'Orçamentos',
    crm:'CRM', estoque:'Estoque', agenda:'Agenda', fin:'Financeiro',
    notas:'Notas', os:'Ordens de Serviço', pdf:'Gerador PDF', config:'Configurações'
  };
  const mhLogo = document.getElementById('mh-logo');
  if(mhLogo && titles[page]){
    mhLogo.childNodes[0].textContent = titles[page];
  }
}

function toggleMoreMenu(){
  const menu = document.getElementById('bn-more-menu');
  if(menu) menu.classList.toggle('show');
}

function hideMoreMenu(){
  const menu = document.getElementById('bn-more-menu');
  if(menu) menu.classList.remove('show');
}

document.addEventListener('click', function(e){
  const sb = document.querySelector('.sidebar');
  const isMenuBtn = e.target.closest('.mh-btn');
  const isInsideSidebar = e.target.closest('.sidebar');
  if(sb && sb.classList.contains('open') && !isInsideSidebar && !isMenuBtn){
    sb.classList.remove('open');
  }
  const moreMenu = document.getElementById('bn-more-menu');
  if(moreMenu && moreMenu.classList.contains('show') && !e.target.closest('.bottom-nav')){
    moreMenu.classList.remove('show');
  }
});

document.addEventListener('keydown', function(e){
  if(e.key === 'Escape'){
    const sb = document.querySelector('.sidebar');
    if(sb) sb.classList.remove('open');
    hideMoreMenu();
  }
});


// ══════════════════════════════════════════════════════════════
//  SWIPE CARDS — motor de touch para os cards mobile
// ══════════════════════════════════════════════════════════════

(function(){
  const THRESHOLD   = 50;   // px para confirmar o swipe
  const MAX_REVEAL  = 250;  // px máximo revelado (largura dos 4 botões)

  let activeWrap = null;    // card atualmente aberto

  function getWrapById(id){ return document.getElementById('swwrap-'+id); }
  function getInnerById(id){ return document.getElementById('swinner-'+id); }

  // Fecha o card atualmente aberto
  window.swipeClose = function(id){
    const inner = getInnerById(id);
    const wrap  = getWrapById(id);
    if(!inner) return;
    inner.style.transform = 'translateX(0)';
    if(wrap) wrap.classList.remove('swiped');
    if(activeWrap && activeWrap === wrap) activeWrap = null;
  };

  function closeAll(exceptWrap){
    document.querySelectorAll('.swipe-card-wrap.swiped').forEach(w=>{
      if(w !== exceptWrap){
        const inner = w.querySelector('.swipe-card-inner');
        if(inner) inner.style.transform = 'translateX(0)';
        w.classList.remove('swiped');
      }
    });
  }

  // Calcula a largura real dos botões de ação
  function actionsWidth(wrap){
    const actions = wrap.querySelector('.swipe-actions');
    return actions ? actions.offsetWidth : MAX_REVEAL;
  }

  // Delegação de eventos: escuta todos os toques no document
  document.addEventListener('touchstart', function(e){
    const wrap = e.target.closest('.swipe-card-wrap');
    if(!wrap) return;
    const inner = wrap.querySelector('.swipe-card-inner');
    if(!inner) return;

    const t0 = e.touches[0];
    let startX = t0.clientX;
    let startY = t0.clientY;
    let currentX = startX;
    let dx = 0;
    let moved = false;
    let isHorizontal = null;

    // Estado inicial (pode já estar aberto)
    const startOffset = wrap.classList.contains('swiped') ? -actionsWidth(wrap) : 0;

    function onMove(ev){
      const t = ev.touches[0];
      dx = t.clientX - startX;
      const dy = t.clientY - startY;

      // Detecta direção predominante na primeira movimentação
      if(isHorizontal === null && (Math.abs(dx) > 4 || Math.abs(dy) > 4)){
        isHorizontal = Math.abs(dx) > Math.abs(dy);
      }
      if(!isHorizontal) return; // scroll vertical — ignora

      ev.preventDefault();
      moved = true;

      const maxRev = actionsWidth(wrap);
      let newX = Math.max(-maxRev, Math.min(0, startOffset + dx));
      inner.style.transition = 'none';
      inner.style.transform  = `translateX(${newX}px)`;
    }

    function onEnd(){
      inner.style.transition = '';
      if(!moved){ cleanup(); return; }

      const maxRev = actionsWidth(wrap);
      const cur    = startOffset + dx;

      if(cur < -THRESHOLD){
        // Abrir: revela ações
        closeAll(wrap);
        inner.style.transform = `translateX(-${maxRev}px)`;
        wrap.classList.add('swiped');
        activeWrap = wrap;
      } else {
        // Fechar
        inner.style.transform = 'translateX(0)';
        wrap.classList.remove('swiped');
        if(activeWrap === wrap) activeWrap = null;
      }
      cleanup();
    }

    function cleanup(){
      wrap.removeEventListener('touchmove', onMove);
      wrap.removeEventListener('touchend',  onEnd);
    }

    wrap.addEventListener('touchmove', onMove, { passive: false });
    wrap.addEventListener('touchend',  onEnd);
  }, { passive: true });

  // Toque fora de qualquer card fecha todos
  document.addEventListener('touchstart', function(e){
    if(!e.target.closest('.swipe-card-wrap')){
      document.querySelectorAll('.swipe-card-wrap.swiped').forEach(w=>{
        const inner = w.querySelector('.swipe-card-inner');
        if(inner) inner.style.transform = 'translateX(0)';
        w.classList.remove('swiped');
      });
    }
  }, { passive: true });

})();
